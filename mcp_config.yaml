# MCP Server Configuration
#
# Place this file in the working directory where bb-mcp runs, or pass
# --config <path> to specify a custom location.
#
# All settings are optional. If this file is absent, all tools and HTTP
# methods are enabled.

server:
  # Only expose tools that use these HTTP methods.
  # Remove or leave empty to allow all methods.
  allowed_methods: ["GET", "POST", "PUT", "PATCH"]

  # Tool names to hide from MCP clients entirely.
  ignored_tools: []
  #  - bitbucket_addon
  #  - bitbucket_properties

# Override the auto-generated description for specific tools.
# Useful for giving the LLM better instructions without re-generating code.
tool_overrides: {}
#  bitbucket_pr:
#    description: "Manage Bitbucket pull requests. Use listPullRequests to find PRs first."
