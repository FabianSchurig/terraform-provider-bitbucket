openapi: 3.0.0
info:
  title: Bitbucket Refs CLI
  version: '2.0'
  x-cli-command-name: Refs
  x-cli-command-use: refs
  x-cli-command-short: Manage Bitbucket branches and tags
  x-cli-command-long: Commands for listing, creating, and deleting branches and tags
    in Bitbucket repositories.
paths:
  /repositories/{workspace}/{repo_slug}/refs:
    get:
      tags:
      - Refs
      description: 'Returns the branches and tags in the repository.


        By default, results will be in the order the underlying source control system
        returns them and identical to

        the ordering one sees when running "$ git show-ref". Note that this follows
        simple

        lexical ordering of the ref names.


        This can be undesirable as it does apply any natural sorting semantics, meaning
        for instance that refs are

        sorted ["branch1", "branch10", "branch2", "v10", "v11", "v9"] instead of ["branch1",
        "branch2",

        "branch10", "v9", "v10", "v11"].


        Sorting can be changed using the ?sort= query parameter. When using ?sort=name
        to explicitly sort on ref name,

        Bitbucket will apply natural sorting and interpret numerical values as numbers
        instead of strings.'
      summary: List branches and tags
      responses:
        '200':
          description: A paginated list of refs matching any filter criteria that
            were provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_refs'
        '403':
          description: 'If the repository is private and the authenticated user does
            not have

            access to it.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: q
        in: query
        description: '

          Query string to narrow down the response as per

          [filtering and sorting](/cloud/bitbucket/rest/intro/#filtering).'
        schema:
          type: string
      - name: sort
        in: query
        description: '

          Field by which the results should be sorted as per

          [filtering and sorting](/cloud/bitbucket/rest/intro/#filtering). The `name`

          field is handled specially for refs in that, if specified as the sort field,
          it

          uses a natural sort order instead of the default lexicographical sort order.
          For example,

          it will return [''1.1'', ''1.2'', ''1.10''] instead of [''1.1'', ''1.10'',
          ''1.2''].'
        schema:
          type: string
      security:
      - oauth2:
        - repository
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:repository:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: listBranchesAndTags
    parameters:
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /repositories/{workspace}/{repo_slug}/refs/branches:
    get:
      tags:
      - Refs
      description: 'Returns a list of all open branches within the specified repository.

        Results will be in the order the source control manager returns them.


        Branches support [filtering and sorting](/cloud/bitbucket/rest/intro/#filtering)

        that can be used to search for specific branches. For instance, to find

        all branches that have "stab" in their name:


        ```

        curl -s https://api.bitbucket.org/2.0/repositories/atlassian/aui/refs/branches
        -G --data-urlencode ''q=name ~ "stab"''

        ```


        By default, results will be in the order the underlying source control system
        returns them and identical to

        the ordering one sees when running "$ git branch --list". Note that this follows
        simple

        lexical ordering of the ref names.


        This can be undesirable as it does apply any natural sorting semantics, meaning
        for instance that tags are

        sorted ["v10", "v11", "v9"] instead of ["v9", "v10", "v11"].


        Sorting can be changed using the ?q= query parameter. When using ?q=name to
        explicitly sort on ref name,

        Bitbucket will apply natural sorting and interpret numerical values as numbers
        instead of strings.'
      summary: List open branches
      responses:
        '200':
          description: A paginated list of branches matching any filter criteria that
            were provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_branches'
              examples:
