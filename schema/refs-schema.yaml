    post:
      tags:
      - Refs
      description: "Creates a new branch in the specified repository.\n\nThe payload\
        \ of the POST should consist of a JSON document that\ncontains the name of\
        \ the tag and the target hash.\n\n```\ncurl https://api.bitbucket.org/2.0/repositories/seanfarley/hg/refs/branches\
        \ \\\n-s -u seanfarley -X POST -H \"Content-Type: application/json\" \\\n\
        -d '{\n    \"name\" : \"smf/create-feature\",\n    \"target\" : {\n      \
        \  \"hash\" : \"default\",\n    }\n}'\n```\n\nThis call requires authentication.\
        \ Private repositories require the\ncaller to authenticate with an account\
        \ that has appropriate\nauthorization.\n\nThe branch name should not include\
        \ any prefixes (e.g.\nrefs/heads). This endpoint does support using short\
        \ hash prefixes for\nthe commit hash, but it may return a 400 response if\
        \ the provided\nprefix is ambiguous. Using a full commit hash is the preferred\n\
        approach."
      summary: Create a branch
      responses:
        '201':
          description: The newly created branch object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/branch'
        '403':
          description: 'If the repository is private and the authenticated user does
            not have

            access to it.

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or branch does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
