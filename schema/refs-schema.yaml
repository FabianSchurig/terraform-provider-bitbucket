    post:
      tags:
      - Refs
      description: "Creates a new annotated tag in the specified repository.\n\nThe\
        \ payload of the POST should consist of a JSON document that\ncontains the\
        \ name of the tag and the target hash.\n\n```\ncurl https://api.bitbucket.org/2.0/repositories/jdoe/myrepo/refs/tags\
        \ \\\n-s -u jdoe -X POST -H \"Content-Type: application/json\" \\\n-d '{\n\
        \    \"name\" : \"new-tag-name\",\n    \"target\" : {\n        \"hash\" :\
        \ \"a1b2c3d4e5f6\",\n    }\n}'\n```\n\nThis endpoint does support using short\
        \ hash prefixes for the commit\nhash, but it may return a 400 response if\
        \ the provided prefix is\nambiguous. Using a full commit hash is the preferred\
        \ approach.\n\nA message for the tag object may optionally be provided. If\
        \ it is\nomitted or the provided message is empty, a default message of\n\"\
        Added tag <tagname> for changeset <shorthash>\" will be used."
      summary: Create a tag
      responses:
        '201':
          description: The newly created tag.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/tag'
        '400':
          description: If the target hash is missing, ambiguous, or invalid, or if
            the name is not provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/tag'
        required: true
