openapi: 3.0.0
info:
  title: Bitbucket Users CLI
  version: '2.0'
  x-cli-command-name: Users
  x-cli-command-use: users
  x-cli-command-short: Manage Bitbucket users
  x-cli-command-long: Commands for viewing user profiles, managing email addresses,
    SSH keys, and GPG keys.
paths:
  /user:
    get:
      tags:
      - Users
      description: Returns the currently logged in user.
      summary: Get current user
      responses:
        '200':
          description: The current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/account'
        '401':
          description: When the request wasn't authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - account
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:user:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getCurrentUser
    parameters: []
  /user/emails:
    get:
      tags:
      - Users
      description: 'Returns all the authenticated user''s email addresses. Both

        confirmed and unconfirmed.'
      summary: List email addresses for current user
      responses:
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - email
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:user:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listEmailAddressesForCurrentUser
    parameters: []
  /user/emails/{email}:
    get:
      tags:
      - Users
      description: 'Returns details about a specific one of the authenticated user''s

        email addresses.


        Details describe whether the address has been confirmed by the user and

        whether it is the user''s primary address or not.'
      summary: Get an email address for current user
      responses:
        default:
          description: Unexpected error.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - email
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:user:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getAnEmailAddressForCurrentUser
    parameters:
    - name: email
      in: path
      description: Email address of the user.
      required: true
      schema:
        type: string
  /users/{selected_user}:
    get:
      tags:
      - Users
      description: 'Gets the public information associated with a user account.


        If the user''s profile is private, `location`, `website` and

        `created_on` elements are omitted.


        Note that the user object returned by this operation is changing significantly,
        due to privacy changes.

        See the [announcement](https://developer.atlassian.com/cloud/bitbucket/bitbucket-api-changes-gdpr/#changes-to-bitbucket-user-objects)
        for details.'
      summary: Get a user
      responses:
        '200':
          description: The user object
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/account'
        '404':
          description: If no user exists for the specified UUID, or if the specified
            account is a team account, not a personal account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2: []
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:user:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: getAUser
    parameters:
    - name: selected_user
      in: path
      description: 'This can either be an Atlassian Account ID OR the UUID of the
        account,

        surrounded by curly-braces, for example: `{account UUID}`.

        '
      required: true
      schema:
        type: string
  /users/{selected_user}/ssh-keys:
    get:
      tags:
      - SSH
      description: Returns a paginated list of the user's SSH public keys.
      summary: List SSH keys
      responses:
        '200':
          description: A list of the SSH keys associated with the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_ssh_user_keys'
              examples:
                response:
                  value:
                    page: 1
                    pagelen: 10
                    size: 1
                    values:
                    - comment: user@myhost
                      created_on: '2018-03-14T13:17:05.196003+00:00'
                      expires_on: null
                      fingerprint: w9tZSiFoZ8oXwS4ZSWrJopGxwvnPIewA6Mo4owAHPrI
                      key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKqP3Cr632C2dNhhgKVcon4ldUSAeKiku2yP9O9/bDtY
                      label: ''
                      last_used: '2018-03-20T13:18:05.196003+00:00'
                      links:
                        self:
                          href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}/ssh-keys/b15b6026-9c02-4626-b4ad-b905f99f763a
                      owner:
                        display_name: Mark Adams
                        links:
                          avatar:
                            href: https://bitbucket.org/account/markadams-atl/avatar/32/
                          html:
                            href: https://bitbucket.org/markadams-atl/
                          self:
                            href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}
                        type: user
                        username: markadams-atl
                        nickname: markadams-atl
                        uuid: '{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}'
                      type: ssh_key
                      uuid: '{b15b6026-9c02-4626-b4ad-b905f99f763a}'
        '403':
          description: If the specified user's keys are not accessible to the current
            user
        '404':
          description: If the specified user does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - account
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:ssh-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listSshKeys
    post:
      tags:
      - SSH
      description: 'Adds a new SSH public key to the specified user account and returns
        the resulting key.


        Example:


        ```

        $ curl -X POST -H "Content-Type: application/json" -d ''{"key": "ssh-ed25519
        AAAAC3NzaC1lZDI1NTE5AAAAIKqP3Cr632C2dNhhgKVcon4ldUSAeKiku2yP9O9/bDtY user@myhost"}''
        https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}/ssh-keys

        ```'
      summary: Add a new SSH key
      responses:
        '201':
          description: The newly created SSH key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssh_account_key'
              examples:
                response:
                  value:
                    comment: user@myhost
                    created_on: '2018-03-14T13:17:05.196003+00:00'
                    expires_on: null
                    fingerprint: w9tZSiFoZ8oXwS4ZSWrJopGxwvnPIewA6Mo4owAHPrI
                    key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKqP3Cr632C2dNhhgKVcon4ldUSAeKiku2yP9O9/bDtY
                    label: ''
                    last_used: '2018-03-20T13:18:05.196003+00:00'
                    links:
                      self:
                        href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}/ssh-keys/b15b6026-9c02-4626-b4ad-b905f99f763a
                    owner:
                      display_name: Mark Adams
                      links:
                        avatar:
                          href: https://bitbucket.org/account/markadams-atl/avatar/32/
                        html:
                          href: https://bitbucket.org/markadams-atl/
                        self:
                          href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}
                      type: user
                      username: markadams-atl
                      nickname: markadams-atl
                      uuid: '{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}'
                    type: ssh_key
                    uuid: '{b15b6026-9c02-4626-b4ad-b905f99f763a}'
        '400':
          description: If the submitted key or related value is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If the current user does not have permission to add a key for
            the specified user
        '404':
          description: If the specified user does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: expires_on
        in: query
        description: 'The date or date-time of when the key will expire,

          in [ISO-8601](https://en.wikipedia.org/wiki/ISO_8601) format.

          Example: `YYYY-MM-DDTHH:mm:ss.sssZ`'
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ssh_account_key'
        description: The new SSH key object. Note that the username property has been
          deprecated due to [privacy changes](https://developer.atlassian.com/cloud/bitbucket/bitbucket-api-changes-gdpr/#removal-of-usernames-from-user-referencing-apis).
      security:
      - oauth2:
        - account:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:ssh-key:bitbucket
        - write:ssh-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: addANewSshKey
    parameters:
    - name: selected_user
      in: path
      description: 'This can either be an Atlassian Account ID OR the UUID of the
        account,

        surrounded by curly-braces, for example: `{account UUID}`.

        '
      required: true
      schema:
        type: string
  /users/{selected_user}/ssh-keys/{key_id}:
    delete:
      tags:
      - SSH
      description: Deletes a specific SSH public key from a user's account.
      summary: Delete a SSH key
      responses:
        '204':
          description: The key has been deleted
        '400':
          description: If the submitted key or related value is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If the current user does not have permission to add a key for
            the specified user
        '404':
          description: If the specified user does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - account:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - delete:ssh-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: deleteASshKey
    get:
      tags:
      - SSH
      description: Returns a specific SSH public key belonging to a user.
      summary: Get a SSH key
      responses:
        '200':
          description: The specific SSH key matching the user and UUID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssh_account_key'
              examples:
                response:
                  value:
                    comment: user@myhost
                    created_on: '2018-03-14T13:17:05.196003+00:00'
                    expires_on: null
                    fingerprint: w9tZSiFoZ8oXwS4ZSWrJopGxwvnPIewA6Mo4owAHPrI
                    key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKqP3Cr632C2dNhhgKVcon4ldUSAeKiku2yP9O9/bDtY
                    label: ''
                    last_used: '2018-03-20T13:18:05.196003+00:00'
                    links:
                      self:
                        href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}/ssh-keys/b15b6026-9c02-4626-b4ad-b905f99f763a
                    owner:
                      display_name: Mark Adams
                      links:
                        avatar:
                          href: https://bitbucket.org/account/markadams-atl/avatar/32/
                        html:
                          href: https://bitbucket.org/markadams-atl/
                        self:
                          href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}
                      type: user
                      username: markadams-atl
                      nickname: markadams-atl
                      uuid: '{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}'
                    type: ssh_key
                    uuid: '{b15b6026-9c02-4626-b4ad-b905f99f763a}'
        '403':
          description: If the specified user or key is not accessible to the current
            user
        '404':
          description: If the specified user or key does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - account
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:ssh-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getASshKey
    put:
      tags:
      - SSH
      description: 'Updates a specific SSH public key on a user''s account


        Note: Only the ''comment'' field can be updated using this API. To modify
        the key or comment values, you must delete and add the key again.


        Example:


        ```

        $ curl -X PUT -H "Content-Type: application/json" -d ''{"label": "Work key"}''
        https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}/ssh-keys/{b15b6026-9c02-4626-b4ad-b905f99f763a}

        ```'
      summary: Update a SSH key
      responses:
        '200':
          description: The newly updated SSH key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ssh_account_key'
              examples:
                response:
                  value:
                    comment: ''
                    created_on: '2018-03-14T13:17:05.196003+00:00'
                    expires_on: null
                    fingerprint: w9tZSiFoZ8oXwS4ZSWrJopGxwvnPIewA6Mo4owAHPrI
                    key: ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKqP3Cr632C2dNhhgKVcon4ldUSAeKiku2yP9O9/bDtY
                    label: Work key
                    last_used: '2018-03-20T13:18:05.196003+00:00'
                    links:
                      self:
                        href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}/ssh-keys/b15b6026-9c02-4626-b4ad-b905f99f763a
                    owner:
                      display_name: Mark Adams
                      links:
                        avatar:
                          href: https://bitbucket.org/account/markadams-atl/avatar/32/
                        html:
                          href: https://bitbucket.org/markadams-atl/
                        self:
                          href: https://api.bitbucket.org/2.0/users/{ed08f5e1-605b-4f4a-aee4-6c97628a673e}
                      type: user
                      username: markadams-atl
                      nickname: markadams-atl
                      uuid: '{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}'
                    type: ssh_key
                    uuid: '{b15b6026-9c02-4626-b4ad-b905f99f763a}'
        '400':
          description: If the submitted key or related value is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If the current user does not have permission to add a key for
            the specified user
        '404':
          description: If the specified user does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ssh_account_key'
        description: The updated SSH key object
      security:
      - oauth2:
        - account:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:ssh-key:bitbucket
        - write:ssh-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: updateASshKey
    parameters:
    - name: key_id
      in: path
      description: The SSH key's UUID value.
      required: true
      schema:
        type: string
    - name: selected_user
      in: path
      description: 'This can either be an Atlassian Account ID OR the UUID of the
        account,

        surrounded by curly-braces, for example: `{account UUID}`.

        '
      required: true
      schema:
        type: string
  /users/{selected_user}/gpg-keys:
    get:
      tags:
      - GPG
      description: 'Returns a paginated list of the user''s GPG public keys.

        The `key` and `subkeys` fields can also be requested from the endpoint.

        See [Partial Responses](/cloud/bitbucket/rest/intro/#partial-response) for
        more details.'
      summary: List GPG keys
      responses:
        '200':
          description: A list of the GPG keys associated with the account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_gpg_user_keys'
              examples:
                response:
                  value:
                    page: 1
                    pagelen: 10
                    size: 1
                    values:
                    - added_on: '2024-09-24T12:09:33.154081+00:00'
                      created_on: '2018-03-20T13:09:04.207005+00:00'
                      expires_on: null
                      fingerprint: h4m26ppxrol7blr7spbc7lhyymokdbnkxd06kzrt
                      key_id: ymokdbnkxd06kzrt
                      last_used: '2024-09-25T15:18:05.196003+00:00'
                      links:
                        self:
                          href: https://api.bitbucket.org/2.0/users/{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}/gpg-keys/H4M26PPXROL7BLR7SPBC7LHYYMOKDBNKXD06KZRT
                      name: Alice's OpenPGP key
                      owner:
                        display_name: Mark Adams
                        links:
                          avatar:
                            href: https://bitbucket.org/account/markadams-atl/avatar/32/
                          html:
                            href: https://bitbucket.org/markadams-atl/
                          self:
                            href: https://api.bitbucket.org/2.0/users/{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}
                        type: user
                        username: markadams-atl
                        nickname: markadams-atl
                        uuid: '{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}'
                      parent_fingerprint: null
                      type: gpg_key
        '403':
          description: If the specified user's keys are not accessible to the current
            user
        '404':
          description: If the specified user does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - account
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:gpg-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listGpgKeys
    post:
      tags:
      - GPG
      description: 'Adds a new GPG public key to the specified user account and returns
        the resulting key.


        Example:


        ```

        $ curl -X POST -H "Content-Type: application/json" -d

        ''{"key": "<insert GPG Key>"}''

        https://api.bitbucket.org/2.0/users/{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}/gpg-keys

        ```'
      summary: Add a new GPG key
      responses:
        '201':
          description: The newly created GPG key.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GPG_account_key'
              examples:
                response:
                  value:
                    added_on: '2024-09-24T12:09:33.154081+00:00'
                    created_on: '2018-03-20T13:09:04.207005+00:00'
                    expires_on: null
                    fingerprint: h4m26ppxrol7blr7spbc7lhyymokdbnkxd06kzrt
                    key_id: ymokdbnkxd06kzrt
                    last_used: '2024-09-25T15:18:05.196003+00:00'
                    links:
                      self:
                        href: https://api.bitbucket.org/2.0/users/{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}/gpg-keys/H4M26PPXROL7BLR7SPBC7LHYYMOKDBNKXD06KZRT
                    name: Alice's OpenPGP key
                    owner:
                      display_name: Mark Adams
                      links:
                        avatar:
                          href: https://bitbucket.org/account/markadams-atl/avatar/32/
                        html:
                          href: https://bitbucket.org/markadams-atl/
                        self:
                          href: https://api.bitbucket.org/2.0/users/{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}
                      type: user
                      username: markadams-atl
                      nickname: markadams-atl
                      uuid: '{d7dd0e2d-3994-4a50-a9ee-d260b6cefdab}'
                    parent_fingerprint: null
                    type: gpg_key
        '400':
          description: If the submitted key or related value is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If the current user does not have permission to add a key for
            the specified user
        '404':
          description: If the specified user does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GPG_account_key'
        description: The new GPG key object.
      security:
      - oauth2:
        - account:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:gpg-key:bitbucket
        - write:gpg-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: addANewGpgKey
    parameters:
    - name: selected_user
      in: path
      description: 'This can either be an Atlassian Account ID OR the UUID of the
        account,

        surrounded by curly-braces, for example: `{account UUID}`.

        '
      required: true
      schema:
        type: string
  /users/{selected_user}/gpg-keys/{fingerprint}:
    delete:
      tags:
      - GPG
      description: Deletes a specific GPG public key from a user's account.
      summary: Delete a GPG key
      responses:
        '204':
          description: The key has been deleted
        '400':
          description: If the submitted key or related value is invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If the current user does not have permission to delete a key
            for the specified user, or the submitted key is a subkey
        '404':
          description: If the specified key does not exist
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - account:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - delete:gpg-key:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: deleteAGpgKey
    get:
      tags:
      - GPG
