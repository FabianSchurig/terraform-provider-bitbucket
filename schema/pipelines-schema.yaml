openapi: 3.0.0
info:
  title: Bitbucket Pipelines CLI
  version: '2.0'
  x-cli-command-name: Pipelines
  x-cli-command-use: pipelines
  x-cli-command-short: Manage Bitbucket Pipelines
  x-cli-command-long: Commands for listing, triggering, and managing Bitbucket Pipelines,
    including steps, logs, variables, runners, caches, and schedules.
paths:
  /repositories/{workspace}/{repo_slug}/pipelines:
    get:
      tags:
      - Pipelines
      summary: List pipelines
      description: 'Find pipelines in a repository.


        Note that unlike other endpoints in the Bitbucket API, this endpoint utilizes
        query parameters to allow filtering

        and sorting of returned results. See [query parameters](#api-repositories-workspace-repo-slug-pipelines-get-request-Query%20parameters)

        for specific details.

        '
      operationId: getPipelinesForRepository
      parameters:
      - name: workspace
        description: This can either be the workspace ID (slug) or the workspace UUID
          surrounded by curly-braces, for example `{workspace UUID}`.
        required: true
        in: path
        schema:
          type: string
      - name: repo_slug
        description: The repository.
        required: true
        in: path
        schema:
          type: string
      - name: creator.uuid
        description: The UUID of the creator of the pipeline to filter by.
        required: false
        in: query
        schema:
          type: string
          format: uuid
      - name: target.ref_type
        description: The type of the reference to filter by.
        required: false
        in: query
        schema:
          type: string
          enum:
          - BRANCH
          - TAG
          - ANNOTATED_TAG
      - name: target.ref_name
        description: The reference name to filter by.
        required: false
        in: query
        schema:
          type: string
      - name: target.branch
        description: The name of the branch to filter by.
        required: false
        in: query
        schema:
          type: string
      - name: target.commit.hash
        description: The revision to filter by.
        required: false
        in: query
        schema:
          type: string
      - name: target.selector.pattern
        description: The pipeline pattern to filter by.
        required: false
        in: query
        schema:
          type: string
      - name: target.selector.type
        description: The type of pipeline to filter by.
        required: false
        in: query
        schema:
          type: string
          enum:
          - BRANCH
          - TAG
          - CUSTOM
          - PULLREQUESTS
          - DEFAULT
      - name: created_on
        description: The creation date to filter by.
        required: false
        in: query
        schema:
          type: string
          format: date-time
      - name: trigger_type
        description: The trigger type to filter by.
        required: false
        in: query
        schema:
          type: string
          enum:
          - PUSH
          - MANUAL
          - SCHEDULED
          - PARENT_STEP
      - name: status
        description: The pipeline status to filter by.
        required: false
        in: query
        schema:
          type: string
          enum:
          - PARSING
          - PENDING
          - PAUSED
          - HALTED
          - BUILDING
          - ERROR
          - PASSED
          - FAILED
          - STOPPED
          - UNKNOWN
      - name: sort
        description: The attribute name to sort on.
        required: false
        in: query
        schema:
          type: string
          enum:
          - creator.uuid
          - created_on
          - run_creation_date
      - name: page
        description: The page number of elements to retrieve.
        required: false
        in: query
        schema:
          type: integer
          format: int32
          minimum: 1
          default: 1
      - name: pagelen
        description: The maximum number of results to return.
        required: false
        in: query
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 100
          default: 10
      responses:
        '200':
          description: The matching pipelines.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_pipelines'
      security:
      - oauth2:
        - pipeline
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pipeline:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
    post:
      tags:
      - Pipelines
      summary: Run a pipeline
      description: "Endpoint to create and initiate a pipeline.\nThere are a number\
        \ of different options to initiate a pipeline, where the payload of the request\
        \ will determine which type of pipeline will be instantiated.\n\n## Trigger\
        \ a pipeline for a branch\n\nOne way to trigger pipelines is by specifying\
        \ the branch for which you want to trigger a pipeline.\nThe specified branch\
        \ will be used to determine which pipeline definition from the `bitbucket-pipelines.yml`\
        \ file will be applied to initiate the pipeline. The pipeline will then do\
        \ a clone of the repository and checkout the latest revision of the specified\
        \ branch.\n\n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/json' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines/\
        \ \\\n      -d '\n      {\n        \"target\": {\n          \"ref_type\":\
        \ \"branch\",\n          \"type\": \"pipeline_ref_target\",\n          \"\
        ref_name\": \"master\"\n        }\n      }'\n```\n\n## Trigger a pipeline\
        \ for a commit on a branch or tag\n\nYou can initiate a pipeline for a specific\
        \ commit and in the context of a specified reference (e.g. a branch, tag or\
        \ bookmark).\nThe specified reference will be used to determine which pipeline\
        \ definition from the bitbucket-pipelines.yml file will be applied to initiate\
        \ the pipeline. The pipeline will clone the repository and then do a checkout\
        \ the specified reference.\n\nThe following reference types are supported:\n\
        \n* `branch`\n* `named_branch`\n* `bookmark`\n * `tag`\n\n### Example\n\n\
        ```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}' \\\n  \
        \    -H 'Content-Type: application/json' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines/\
        \ \\\n      -d '\n      {\n        \"target\": {\n          \"commit\": {\n\
        \            \"type\": \"commit\",\n            \"hash\": \"ce5b7431602f7cbba007062eeb55225c6e18e956\"\
        \n          },\n          \"ref_type\": \"branch\",\n          \"type\": \"\
        pipeline_ref_target\",\n          \"ref_name\": \"master\"\n        }\n  \
        \    }'\n```\n\n## Trigger a specific pipeline definition for a commit\n\n\
        You can trigger a specific pipeline that is defined in your `bitbucket-pipelines.yml`\
        \ file for a specific commit.\nIn addition to the commit revision, you specify\
        \ the type and pattern of the selector that identifies the pipeline definition.\
        \ The resulting pipeline will then clone the repository and checkout the specified\
        \ revision.\n\n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/json' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines/\
        \ \\\n      -d '\n      {\n        \"target\": {\n          \"commit\": {\n\
        \            \"hash\":\"a3c4e02c9a3755eccdc3764e6ea13facdf30f923\",\n    \
        \        \"type\":\"commit\"\n          },\n          \"selector\": {\n  \
        \          \"type\":\"custom\",\n            \"pattern\":\"Deploy to production\"\
        \n          },\n          \"type\":\"pipeline_commit_target\"\n        }\n\
        \      }'\n```\n\n## Trigger a specific pipeline definition for a commit on\
        \ a branch or tag\n\nYou can trigger a specific pipeline that is defined in\
        \ your `bitbucket-pipelines.yml` file for a specific commit in the context\
        \ of a specified reference.\nIn addition to the commit revision, you specify\
        \ the type and pattern of the selector that identifies the pipeline definition,\
        \ as well as the reference information. The resulting pipeline will then clone\
        \ the repository a checkout the specified reference.\n\n### Example\n\n```\n\
        $ curl -X POST -is -u '{atlassian_account_email}:{api_token}' \\\n      -H\
        \ 'Content-Type: application/json' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines/\
        \ \\\n      -d '\n      {\n        \"target\": {\n          \"commit\": {\n\
        \            \"hash\":\"a3c4e02c9a3755eccdc3764e6ea13facdf30f923\",\n    \
        \        \"type\":\"commit\"\n          },\n          \"selector\": {\n  \
        \          \"type\": \"custom\",\n            \"pattern\": \"Deploy to production\"\
        \n          },\n          \"type\": \"pipeline_ref_target\",\n          \"\
        ref_name\": \"master\",\n          \"ref_type\": \"branch\"\n        }\n \
        \     }'\n```\n\n## Trigger a custom pipeline with variables\n\nIn addition\
        \ to triggering a custom pipeline that is defined in your `bitbucket-pipelines.yml`\
        \ file as shown in the examples above, you can specify variables that will\
        \ be available for your build. In the request, provide a list of variables,\
        \ specifying the following for each variable: key, value, and whether it should\
        \ be secured or not (this field is optional and defaults to not secured).\n\
        \n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/json' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines/\
        \ \\\n      -d '\n      {\n        \"target\": {\n          \"type\": \"pipeline_ref_target\"\
        ,\n          \"ref_type\": \"branch\",\n          \"ref_name\": \"master\"\
        ,\n          \"selector\": {\n            \"type\": \"custom\",\n        \
        \    \"pattern\": \"Deploy to production\"\n          }\n        },\n    \
        \    \"variables\": [\n          {\n            \"key\": \"var1key\",\n  \
        \          \"value\": \"var1value\",\n            \"secured\": true\n    \
        \      },\n          {\n            \"key\": \"var2key\",\n            \"\
        value\": \"var2value\"\n          }\n        ]\n      }'\n```\n\n## Trigger\
        \ a pull request pipeline\n\nYou can also initiate a pipeline for a specific\
        \ pull request.\n\n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/json' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines/\
        \ \\\n      -d '\n      {\n        \"target\": {\n          \"type\": \"pipeline_pullrequest_target\"\
        ,\n          \"source\": \"pull-request-branch\",\n          \"destination\"\
        : \"master\",\n          \"destination_commit\": {\n            \"hash\":\
        \ \"9f848b7\"\n          },\n          \"commit\": {\n            \"hash\"\
        : \"1a372fc\"\n          },\n          \"pullrequest\": {\n            \"\
        id\": \"3\"\n          },\n          \"selector\": {\n            \"type\"\
        : \"pull-requests\",\n            \"pattern\": \"**\"\n          }\n     \
        \   }\n      }'\n```\n\n# On-demand pipeline\n\nBy default, pipelines run\
        \ using the YAML in the repository’s `bitbucket-pipelines.yml` configuration\
        \ file.\nWith an _on-demand_ pipeline, you include the pipeline’s YAML in\
        \ the request body. That YAML applies only\nto that run and overrides the\
        \ YAML in `bitbucket-pipelines.yml`.\n\nJust like with regular pipelines,\
        \ there is a number of different options to initiate an on-demand pipeline.\n\
        However, since the payload contains YAML configuration in this case, _query\
        \ parameters_ are used to supply\nthe necessary metadata to determine which\
        \ type of pipeline will be instantiated. These query parameters\nare derived\
        \ from the JSON equivalent by turning each property into a key-value pair\
        \ with the JSON path\nof the property as the new key.\n\n## Trigger on-demand\
        \ pipeline for a branch\n\nYou can initiate an on-demand pipeline for a specific\
        \ branch. This branch will be used to determine\nwhich pipeline definition\
        \ from the supplied YAML configuration will be applied to initiate the pipeline.\n\
        The pipeline will then do a clone of the repository and check out the latest\
        \ revision of the specified branch.\n\nTo trigger an on-demand pipeline for\
        \ a _branch_ the requesting user must have **write permission** for\nthat\
        \ branch (which can be limited by [branch restrictions](https://support.atlassian.com/bitbucket-cloud/docs/use-branch-permissions/)).\n\
        \n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/yaml' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines?target.type=pipeline_ref_target&target.ref_type=branch&target.ref_name=master\
        \ \\\n      -d '\npipelines:\n  default:\n    - step:\n        script:\n \
        \         - echo This is an on-demand pipeline'\n```\n\n## Trigger on-demand\
        \ pipeline for a commit on a branch or tag\n\nYou can initiate an on-demand\
        \ pipeline for a specific commit and in the context of a specified reference\n\
        (branch or tag). The specified reference will be used to determine which pipeline\
        \ definition from the supplied\nYAML configuration will be applied to initiate\
        \ the pipeline. The pipeline will clone the repository and\ncheck out the\
        \ specified reference.\n\nTo trigger an on-demand pipeline for a _branch_\
        \ the requesting user must have **write permission** for\nthat branch (which\
        \ can be limited by [branch restrictions](https://support.atlassian.com/bitbucket-cloud/docs/use-branch-permissions/)).\n\
        \n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/yaml' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines?target.type=pipeline_ref_target&target.ref_type=branch&target.ref_name=master&target.commit.hash=ce5b7431602f7cbba007062eeb55225c6e18e956\
        \ \\\n      -d '\npipelines:\n  default:\n    - step:\n        script:\n \
        \         - echo This is an on-demand pipeline'\n```\n\n## Trigger a specific\
        \ on-demand pipeline definition for a commit\n\nYou can trigger a specific\
        \ pipeline that is defined in the supplied YAML configuration for a specific\
        \ commit.\nIn addition to the commit revision, you specify the type and pattern\
        \ of the selector that identifies\nthe pipeline definition. The resulting\
        \ pipeline will then clone the repository and checkout the specified revision.\n\
        \n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/yaml' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines?target.type=pipeline_commit_target&target.commit.hash=a3c4e02c9a3755eccdc3764e6ea13facdf30f923&target.selector.type=custom&target.selector.pattern=security-scan\
        \ \\\n      -d '\npipelines:\n  custom:\n    security-scan:\n      - step:\n\
        \          script:\n            - echo Run on-demand security scan\n```\n\n\
        ## Trigger a custom on-demand pipeline with variables\n\nIn addition to triggering\
        \ a custom on-demand pipeline that is defined in the supplied YAML configuration\n\
        as shown in the examples above, you can specify variables that will be available\
        \ for your build.\nIn the request, provide each variable as an indexed set\
        \ of query parameters representing its key, value,\nand whether it should\
        \ be secured or not (this field is optional and defaults to not secured).\n\
        \n### Example\n\n```\n$ curl -X POST -is -u '{atlassian_account_email}:{api_token}'\
        \ \\\n      -H 'Content-Type: application/yaml' \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines?target.type=pipeline_ref_target&target.ref_type=branch&target.ref_name=master&target.selector.type=custom&target.selector.pattern=security-scan&variables[0].key=var1key&variables[0].value=var1value&variables[0].secured=true&variables[1].key=var2key&variables[1].value=var2value\
        \ \\\n      -d '\npipelines:\n  custom:\n    security-scan:\n      - variables:\n\
        \          - name: var1key\n          - name: var2key\n      - step:\n   \
        \       script:\n            - echo Run on-demand security scan'\n```\n\n\
        ## Trigger a pull request pipeline\n\nYou can also initiate an on-demand pipeline\
        \ for a specific pull request.\n\n### Example\n\n```\n$ curl -X POST -is -u\
        \ '{atlassian_account_email}:{api_token}' \\\n      -H 'Content-Type: application/yaml'\
        \ \\\n      https://api.bitbucket.org/2.0/repositories/{workspace}/{repo_slug}/pipelines?target.type=pipeline_pullrequest_target&target.source=pull-request-branch&target.destination=destination&target.destination_commit.hash=9f848b7&target.commit.hash=1a372fc&target.pullrequest.id=3&target.selector.type=pull-requests&target.selector.pattern=**\
        \ \\\n      -d '\npipelines:\n  pull-requests:\n    \"**\":\n      - step:\n\
        \          script:\n            - echo This is an on-demand pipeline'\n```\n"
      operationId: createPipelineForRepository
      parameters:
      - name: workspace
        description: This can either be the workspace ID (slug) or the workspace UUID
          surrounded by curly-braces, for example `{workspace UUID}`.
        required: true
        in: path
        schema:
          type: string
      - name: repo_slug
        description: The repository.
        required: true
        in: path
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pipeline'
        description: The pipeline to initiate.
        required: true
      responses:
        '201':
          description: The initiated pipeline.
          headers:
            Location:
              description: The URL of the newly created pipeline.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline'
        '400':
          description: The account or repository is not enabled, the yml file does
            not exist in the repository for the given revision, or the request body
            contained invalid properties.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The account or repository was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - pipeline
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pipeline:bitbucket
        - write:pipeline:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
  /repositories/{workspace}/{repo_slug}/pipelines/{pipeline_uuid}:
    get:
      tags:
      - Pipelines
      summary: Get a pipeline
      description: Retrieve a specified pipeline
      operationId: getPipelineForRepository
      parameters:
      - name: workspace
        description: This can either be the workspace ID (slug) or the workspace UUID
          surrounded by curly-braces, for example `{workspace UUID}`.
        required: true
        in: path
        schema:
          type: string
      - name: repo_slug
        description: The repository.
        required: true
        in: path
        schema:
          type: string
      - name: pipeline_uuid
        description: The pipeline UUID.
        required: true
        in: path
        schema:
          type: string
      responses:
        '200':
          description: The pipeline.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline'
        '404':
          description: No account, repository or pipeline with the UUID provided exists.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - pipeline
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pipeline:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
  /repositories/{workspace}/{repo_slug}/pipelines/{pipeline_uuid}/steps:
    get:
      tags:
      - Pipelines
      summary: List steps for a pipeline
      description: Find steps for the given pipeline.
      operationId: getPipelineStepsForRepository
      parameters:
      - name: workspace
        description: This can either be the workspace ID (slug) or the workspace UUID
          surrounded by curly-braces, for example `{workspace UUID}`.
        required: true
        in: path
        schema:
          type: string
      - name: repo_slug
        description: The repository.
        required: true
        in: path
        schema:
          type: string
      - name: pipeline_uuid
        description: The UUID of the pipeline.
        required: true
        in: path
        schema:
          type: string
      responses:
        '200':
          description: The steps.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_pipeline_steps'
      security:
      - oauth2:
        - pipeline
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pipeline:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
  /repositories/{workspace}/{repo_slug}/pipelines/{pipeline_uuid}/steps/{step_uuid}:
    get:
      tags:
      - Pipelines
      summary: Get a step of a pipeline
      description: Retrieve a given step of a pipeline.
      operationId: getPipelineStepForRepository
      parameters:
      - name: workspace
        description: This can either be the workspace ID (slug) or the workspace UUID
          surrounded by curly-braces, for example `{workspace UUID}`.
        required: true
        in: path
        schema:
          type: string
      - name: repo_slug
        description: The repository.
        required: true
        in: path
        schema:
          type: string
      - name: pipeline_uuid
        description: The UUID of the pipeline.
        required: true
        in: path
        schema:
          type: string
      - name: step_uuid
        description: The UUID of the step.
        required: true
        in: path
        schema:
          type: string
      responses:
        '200':
          description: The step.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pipeline_step'
        '404':
          description: No account, repository, pipeline or step with the UUID provided
            exists for the pipeline with the UUID provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - pipeline
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pipeline:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
  /repositories/{workspace}/{repo_slug}/pipelines/{pipeline_uuid}/steps/{step_uuid}/log:
    get:
      tags:
      - Pipelines
      summary: Get log file for a step
      description: 'Retrieve the log file for a given step of a pipeline.


        This endpoint supports (and encourages!) the use of [HTTP Range requests](https://tools.ietf.org/html/rfc7233)
        to deal with potentially very large log files.'
      operationId: getPipelineStepLogForRepository
      parameters:
      - name: workspace
        description: This can either be the workspace ID (slug) or the workspace UUID
          surrounded by curly-braces, for example `{workspace UUID}`.
        required: true
        in: path
        schema:
          type: string
      - name: repo_slug
        description: The repository.
        required: true
        in: path
        schema:
          type: string
      - name: pipeline_uuid
        description: The UUID of the pipeline.
        required: true
        in: path
        schema:
          type: string
      - name: step_uuid
        description: The UUID of the step.
        required: true
        in: path
        schema:
          type: string
      responses:
        '200':
          description: The raw log file for this pipeline step.
        '304':
          description: The log has the same etag as the provided If-None-Match header.
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/error'
        '307':
          description: After the step is completed, the log is moved to long term
            storage and a redirection to the log file is returned.
        '404':
          description: A pipeline with the given UUID does not exist, a step with
            the given UUID does not exist in the pipeline or a log file does not exist
            for the given step.
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/error'
        '416':
          description: The requested range does not exist for requests that specified
            the [HTTP Range header](https://tools.ietf.org/html/rfc7233#section-3.1).
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - pipeline
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pipeline:bitbucket
