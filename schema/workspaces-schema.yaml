  /workspaces/{workspace}/hooks:
    get:
      tags:
      - Workspaces
      - Webhooks
      description: Returns a paginated list of webhooks installed on this workspace.
      summary: List webhooks for a workspace
      responses:
        '200':
          description: The paginated list of installed webhooks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_webhook_subscriptions'
        '403':
          description: If the authenticated user is not an owner on the specified
            workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the specified workspace does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - webhook
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:webhook:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listWebhooksForAWorkspace
    post:
      tags:
      - Workspaces
      - Webhooks
      description: "Creates a new webhook on the specified workspace.\n\nWorkspace\
        \ webhooks are fired for events from all repositories contained\nby that workspace.\n\
        \nExample:\n\n```\n$ curl -X POST -u credentials -H 'Content-Type: application/json'\n\
        \  https://api.bitbucket.org/2.0/workspaces/my-workspace/hooks\n  -d '\n \
        \   {\n      \"description\": \"Webhook Description\",\n      \"url\": \"\
        https://example.com/\",\n      \"active\": true,\n      \"secret\": \"this\
        \ is a really bad secret\",\n      \"events\": [\n        \"repo:push\",\n\
        \        \"issue:created\",\n        \"issue:updated\"\n      ]\n    }'\n\
        ```\n\nWhen the `secret` is provided it will be used as the key to generate\
        \ a HMAC\ndigest value sent in the `X-Hub-Signature` header at delivery time.\
        \ Passing\na `null` or empty `secret` or not passing a `secret` will leave\
        \ the webhook's\nsecret unset. Bitbucket only generates the `X-Hub-Signature`\
        \ when the webhook's\nsecret is set.\n\nThis call requires the webhook scope,\
        \ as well as any scope\nthat applies to the events that the webhook subscribes\
        \ to. In the\nexample above that means: `webhook`, `repository` and `issue`.\n\
        \nThe `url` must properly resolve and cannot be an internal, non-routed address.\n\
        \nOnly workspace owners can install webhooks on workspaces."
      summary: Create a webhook for a workspace
      responses:
        '201':
          description: If the webhook was registered successfully.
          headers:
            Location:
              description: The URL of new newly created webhook.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook_subscription'
        '403':
          description: If the authenticated user does not have permission to install
            webhooks on the specified workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the specified workspace does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - webhook
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:webhook:bitbucket
        - write:webhook:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: createAWebhookForAWorkspace
    parameters:
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /workspaces/{workspace}/hooks/{uid}:
    delete:
      tags:
      - Workspaces
      - Webhooks
      description: Deletes the specified webhook subscription from the given workspace.
      summary: Delete a webhook for a workspace
      responses:
        '204':
          description: When the webhook was deleted successfully
        '403':
          description: If the authenticated user does not have permission to delete
            the webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the webhook or workspace does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - webhook
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - delete:webhook:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: deleteAWebhookForAWorkspace
    get:
      tags:
      - Workspaces
      - Webhooks
      description: 'Returns the webhook with the specified id installed on the given

        workspace.'
      summary: Get a webhook for a workspace
      responses:
        '200':
          description: The webhook subscription object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook_subscription'
        '404':
          description: If the webhook or workspace does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - webhook
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:webhook:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getAWebhookForAWorkspace
    put:
      tags:
      - Workspaces
      - Webhooks
      description: 'Updates the specified webhook subscription.


        The following properties can be mutated:


        * `description`

        * `url`

        * `secret`

        * `active`

        * `events`


        The hook''s secret is used as a key to generate the HMAC hex digest sent in
        the

        `X-Hub-Signature` header at delivery time. This signature is only generated

        when the hook has a secret.


        Set the hook''s secret by passing the new value in the `secret` field. Passing
        a

        `null` value in the `secret` field will remove the secret from the hook. The

        hook''s secret can be left unchanged by not passing the `secret` field in
        the

        request.'
      summary: Update a webhook for a workspace
      responses:
        '200':
          description: The webhook subscription object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/webhook_subscription'
        '403':
          description: If the authenticated user does not have permission to update
            the webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the webhook or workspace does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - webhook
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:webhook:bitbucket
        - write:webhook:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: updateAWebhookForAWorkspace
    parameters:
    - name: uid
      in: path
      description: Installed webhook's ID
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /workspaces/{workspace}/projects:
    get:
      tags:
      - Workspaces
      description: Returns the list of projects in this workspace.
      summary: List projects in a workspace
      responses:
        '200':
          description: The list of projects in this workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_projects'
        '404':
          description: A workspace doesn't exist at this location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - project
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:project:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: listProjectsInAWorkspace
    post:
      tags:
      - Projects
      description: "Creates a new project.\n\nNote that the avatar has to be embedded\
        \ as either a data-url\nor a URL to an external image as shown in the examples\
        \ below:\n\n```\n$ body=$(cat << EOF\n{\n    \"name\": \"Mars Project\",\n\
        \    \"key\": \"MARS\",\n    \"description\": \"Software for colonizing mars.\"\
        ,\n    \"links\": {\n        \"avatar\": {\n            \"href\": \"data:image/gif;base64,R0lGODlhEAAQAMQAAORHHOVSKudfOulrSOp3WOyDZu6QdvCchPGolfO0o/...\"\
        \n        }\n    },\n    \"is_private\": false\n}\nEOF\n)\n$ curl -H \"Content-Type:\
        \ application/json\" \\\n       -X POST \\\n       -d \"$body\" \\\n     \
        \  https://api.bitbucket.org/2.0/workspaces/teams-in-space/projects/ | jq\
        \ .\n{\n  // Serialized project document\n}\n```\n\nor even:\n\n```\n$ body=$(cat\
        \ << EOF\n{\n    \"name\": \"Mars Project\",\n    \"key\": \"MARS\",\n   \
        \ \"description\": \"Software for colonizing mars.\",\n    \"links\": {\n\
        \        \"avatar\": {\n            \"href\": \"http://i.imgur.com/72tRx4w.gif\"\
        \n        }\n    },\n    \"is_private\": false\n}\nEOF\n)\n$ curl -H \"Content-Type:\
        \ application/json\" \\\n       -X POST \\\n       -d \"$body\" \\\n     \
        \  https://api.bitbucket.org/2.0/workspaces/teams-in-space/projects/ | jq\
        \ .\n{\n  // Serialized project document\n}\n```"
      summary: Create a project in a workspace
      responses:
        '201':
          description: A new project has been created.
          headers:
            Location:
              description: The location of the newly created project
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/project'
        '403':
          description: The user requesting to create a project does not have the necessary
            permissions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: A workspace doesn't exist at this location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        $ref: '#/components/requestBodies/project'
      security:
      - oauth2:
        - project:admin
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - admin:project:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: createAProjectInAWorkspace
    parameters:
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /workspaces/{workspace}/projects/{project_key}:
    delete:
      tags:
      - Projects
      description: 'Deletes this project. This is an irreversible operation.


        You cannot delete a project that still contains repositories.

        To delete the project, [delete](/cloud/bitbucket/rest/api-group-repositories/#api-repositories-workspace-repo-slug-delete)

        or transfer the repositories first.


        Example:

        ```

        $ curl -X DELETE https://api.bitbucket.org/2.0/workspaces/bbworkspace1/projects/PROJ

        ```'
      summary: Delete a project for a workspace
      responses:
        '204':
          description: Successful deletion.
        '403':
          description: The requesting user isn't authorized to delete the project
            or the project isn't empty.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: A project isn't hosted at this location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - project:admin
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - admin:project:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: deleteAProjectForAWorkspace
    get:
      tags:
      - Projects
      - Workspaces
      description: Returns the requested project.
      summary: Get a project for a workspace
      responses:
        '200':
          description: The project that is part of a workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/project'
        '401':
          description: The request wasn't authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: The requesting user isn't authorized to access the project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: A project isn't hosted at this location.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - project
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:project:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: getAProjectForAWorkspace
    put:
      tags:
      - Projects
      description: 'Since this endpoint can be used to both update and to create a

        project, the request body depends on the intent.


        #### Creation


        See the POST documentation for the project collection for an

        example of the request body.


        Note: The `key` should not be specified in the body of request

        (since it is already present in the URL). The `name` is required,

        everything else is optional.


        #### Update


        See the POST documentation for the project collection for an

        example of the request body.


        Note: The key is not required in the body (since it is already in

        the URL). The key may be specified in the body, if the intent is

        to change the key itself. In such a scenario, the location of the

        project is changed and is returned in the `Location` header of the

        response.'
      summary: Update a project for a workspace
      responses:
        '200':
          description: The existing project is has been updated.
          headers:
            Location:
              description: 'The location of the project. This header is only provided

                when the project key is updated.'
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/project'
        '201':
          description: A new project has been created.
          headers:
            Location:
              description: The location of the newly created project
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/project'
        '403':
          description: The requesting user isn't authorized to update or create the
            project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: A workspace doesn't exist at the location. Note that the project's
            absence from this location doesn't raise a 404, since a PUT at a non-existent
            location can be used to create a new project.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        $ref: '#/components/requestBodies/project'
      security:
      - oauth2:
        - project:admin
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - admin:project:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: updateAProjectForAWorkspace
    parameters:
    - name: project_key
      in: path
      description: 'The project in question. This is the actual `key` assigned

        to the project.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /workspaces/{workspace}/pullrequests/{selected_user}:
    get:
      tags:
      - Workspaces
      - Pullrequests
      description: 'Returns all workspace pull requests authored by the specified
        user.


        By default only open pull requests are returned. This can be controlled

        using the `state` query parameter. To retrieve pull requests that are

        in one of multiple states, repeat the `state` parameter for each

        individual state.


        This endpoint also supports filtering and sorting of the results. See

        [filtering and sorting](/cloud/bitbucket/rest/intro/#filtering) for more details.'
      summary: List workspace pull requests for a user
      responses:
        '200':
          description: All pull requests authored by the specified user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_pullrequests'
        '404':
          description: If the specified user does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: state
        in: query
        description: Only return pull requests that are in this state. This parameter
          can be repeated.
        schema:
          type: string
          enum:
          - OPEN
          - MERGED
          - DECLINED
          - SUPERSEDED
      security:
      - oauth2:
        - pullrequest
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pullrequest:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listWorkspacePullRequestsForAUser
    parameters:
    - name: selected_user
      in: path
      description: 'This can either be the username of the pull request author, the
        author''s UUID

        surrounded by curly-braces, for example: `{account UUID}`, or the author''s
        Atlassian ID.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
components:
  schemas:
    paginated_workspaces:
      type: object
      title: Paginated Workspaces
      description: A paginated list of workspaces.
      properties:
        size:
          type: integer
          description: Total number of objects in the response. This is an optional
            element that is not provided in all responses, as it can be expensive
            to compute.
          minimum: 0
        page:
          type: integer
          description: Page number of the current results. This is an optional element
            that is not provided in all responses.
          minimum: 1
        pagelen:
          type: integer
          description: Current number of objects on the existing page. The default
            value is 10 with 100 being the maximum allowed value. Individual APIs
            may enforce different values.
          minimum: 1
        next:
          type: string
          description: Link to the next page if it exists. The last page of a collection
            does not have this value. Use this link to navigate the result set and
            refrain from constructing your own URLs.
          format: uri
        previous:
          type: string
          description: Link to previous page if it exists. A collections first page
            does not have this value. This is an optional element that is not provided
            in all responses. Some result sets strictly support forward navigation
            and never provide previous links. Clients must anticipate that backwards
            navigation is not always available. Use this link to navigate the result
            set and refrain from constructing your own URLs.
          format: uri
        values:
          type: array
          items:
            $ref: '#/components/schemas/workspace'
          minItems: 0
          uniqueItems: true
      additionalProperties: false
    webhook_subscription:
      allOf:
      - $ref: '#/components/schemas/object'
      - type: object
        title: Webhook Subscription
        description: A Webhook subscription.
        properties:
          uuid:
            type: string
            description: The webhook's id
          url:
            type: string
            description: The URL events get delivered to.
            format: uri
          description:
            type: string
            description: A user-defined description of the webhook.
          subject_type:
            type: string
            description: The type of entity. Set to either `repository` or `workspace`
              based on where the subscription is defined.
            enum:
            - repository
            - workspace
          subject:
            $ref: '#/components/schemas/object'
          active:
            type: boolean
          created_at:
            type: string
            format: date-time
          events:
            type: array
            description: The events this webhook is subscribed to.
            items:
              type: string
              enum:
              - issue:comment_created
              - issue:created
              - issue:updated
              - pipeline:span_created
              - project:updated
              - pullrequest:approved
              - pullrequest:changes_request_created
              - pullrequest:changes_request_removed
              - pullrequest:comment_created
              - pullrequest:comment_deleted
              - pullrequest:comment_reopened
              - pullrequest:comment_resolved
              - pullrequest:comment_updated
              - pullrequest:created
              - pullrequest:fulfilled
              - pullrequest:push
              - pullrequest:rejected
              - pullrequest:unapproved
              - pullrequest:updated
              - repo:commit_comment_created
              - repo:commit_status_created
              - repo:commit_status_updated
              - repo:created
              - repo:deleted
              - repo:fork
              - repo:imported
              - repo:push
              - repo:transfer
              - repo:updated
            minItems: 1
            uniqueItems: true
          secret_set:
            type: boolean
            description: Indicates whether or not the hook has an associated secret.
              It is not possible to see the hook's secret. This field is ignored during
              updates.
          secret:
            type: string
            description: The secret to associate with the hook. The secret is never
              returned via the API. As such, this field is only used during updates.
              The secret can be set to `null` or "" to remove the secret (or create
              a hook with no secret). Leaving out the secret field during updates
              will leave the secret unchanged. Leaving out the secret during creation
              will create a hook with no secret.
            minLength: 0
            maxLength: 128
        additionalProperties: true
    project:
      allOf:
      - $ref: '#/components/schemas/object'
      - type: object
        title: Project
        description: "A Bitbucket project.\n            Projects are used by teams\
          \ to organize repositories."
        properties:
          links:
            type: object
            properties:
              html:
                type: object
                title: Link
                description: A link to a resource related to this object.
                properties:
                  href:
                    type: string
                    format: uri
                  name:
                    type: string
                additionalProperties: false
              avatar:
                type: object
                title: Link
                description: A link to a resource related to this object.
                properties:
                  href:
                    type: string
                    format: uri
                  name:
                    type: string
                additionalProperties: false
            additionalProperties: false
          uuid:
            type: string
            description: The project's immutable id.
          key:
            type: string
