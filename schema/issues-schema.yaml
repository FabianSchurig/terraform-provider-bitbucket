      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:issue:bitbucket
        - admin:repository:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: checkIssueImportStatus
    post:
      tags:
      - Issue tracker
      description: 'A POST request to this endpoint will import the zip file given
        by the archive parameter into the repository. All

        existing issues will be deleted and replaced by the contents of the imported
        zip file.


        Imports are done through a multipart/form-data POST. There is one valid and
        required form field, with the name

        "archive," which needs to be a file field:


        ```

        $ curl -u <username> -X POST -F archive=@/path/to/file.zip https://api.bitbucket.org/2.0/repositories/<owner_username>/<repo_slug>/issues/import

        ```'
      summary: Import issues
      responses:
        '202':
          description: Import job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/issue_job_status'
