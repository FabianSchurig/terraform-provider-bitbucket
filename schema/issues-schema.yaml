openapi: 3.0.0
info:
  title: Bitbucket Issues CLI
  version: '2.0'
  x-cli-command-name: Issues
  x-cli-command-use: issues
  x-cli-command-short: Manage Bitbucket issues
  x-cli-command-long: Commands for listing, creating, updating, and managing issues,
    comments, attachments, components, milestones, and versions.
paths:
  /repositories/{workspace}/{repo_slug}/issues:
    get:
      tags:
      - Issue tracker
      description: Returns the issues in the issue tracker.
      summary: List issues
      responses:
        '200':
          description: A paginated list of the issues matching any filter criteria
            that were provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_issues'
        '404':
          description: The specified repository does not exist or does not have the
            issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listIssues
    post:
      tags:
      - Issue tracker
      description: 'Creates a new issue.


        This call requires authentication. Private repositories or private

        issue trackers require the caller to authenticate with an account that

        has appropriate authorization.


        The authenticated user is used for the issue''s `reporter` field.'
      summary: Create an issue
      responses:
        '201':
          description: The newly created issue.
          headers:
            Location:
              description: The (absolute) URL of the newly created issue.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/issue'
        '401':
          description: When the request wasn't authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: When the authenticated user isn't authorized to create the
            issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository does not exist or does not have the
            issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/issue'
        description: The new issue. The only required element is `title`. All other
          elements can be omitted from the body.
        required: true
      security:
      - oauth2:
        - issue:write
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
        - write:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: createAnIssue
    parameters:
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /repositories/{workspace}/{repo_slug}/issues/{issue_id}:
    delete:
      tags:
      - Issue tracker
      description: 'Deletes the specified issue. This requires write access to the

        repository.'
      summary: Delete an issue
      responses:
        '204':
          description: Indicates the issue was deleted successfully.
        '403':
          description: When the authenticated user isn't authorized to delete the
            issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue:write
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - delete:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: deleteAnIssue
    get:
      tags:
      - Issue tracker
      description: Returns the specified issue.
      summary: Get an issue
      responses:
        '200':
          description: The issue object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/issue'
        '403':
          description: When the authenticated user isn't authorized to access the
            issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '410':
          description: The specified issue is unavailable.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getAnIssue
    put:
      tags:
      - Issue tracker
      description: "Modifies the issue.\n\n```\n$ curl https://api.bitbucket.org/2.0/repostories/evzijst/dogslow/issues/123\
        \ \\\n  -u evzijst -s -X PUT -H 'Content-Type: application/json' \\\n  -d\
        \ '{\n  \"title\": \"Updated title\",\n  \"assignee\": {\n    \"account_id\"\
        : \"5d5355e8c6b9320d9ea5b28d\"\n  },\n  \"priority\": \"minor\",\n  \"version\"\
        : {\n    \"name\": \"1.0\"\n  },\n  \"component\": null\n}'\n```\n\nThis example\
        \ changes the `title`, `assignee`, `priority` and the\n`version`. It also\
        \ removes the value of the `component` from the issue\nby setting the field\
        \ to `null`. Any field not present keeps its existing\nvalue.\n\nEach time\
        \ an issue is edited in the UI or through the API, an immutable\nchange record\
        \ is created under the `/issues/123/changes` endpoint. It\nalso has a comment\
        \ associated with the change."
      summary: Update an issue
      responses:
        '200':
          description: The updated issue object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/issue'
        '403':
          description: When the authenticated user isn't authorized to access the
            issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue:write
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
        - write:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: updateAnIssue
    parameters:
    - name: issue_id
      in: path
      description: The issue id
      required: true
      schema:
        type: string
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /repositories/{workspace}/{repo_slug}/issues/{issue_id}/attachments:
    get:
      tags:
      - Issue tracker
      description: 'Returns all attachments for this issue.


        This returns the files'' meta data. This does not return the files''

        actual contents.


        The files are always ordered by their upload date.'
      summary: List attachments for an issue
      responses:
        '200':
          description: A paginated list of all attachments for this issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_issue_attachments'
        '401':
          description: If the issue tracker is private and the request was not authenticated.
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listAttachmentsForAnIssue
    post:
      tags:
      - Issue tracker
      description: 'Upload new issue attachments.


        To upload files, perform a `multipart/form-data` POST containing one

        or more file fields.


        When a file is uploaded with the same name as an existing attachment,

        then the existing file will be replaced.'
      summary: Upload an attachment to an issue
      responses:
        '201':
          description: An empty response document.
          headers:
            Location:
              description: The URL to the issue's collection of attachments.
              schema:
                type: string
        '400':
          description: If no files were uploaded, or if the wrong `Content-Type` was
            used.
        '401':
          description: If the issue tracker is private and the request was not authenticated.
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue:write
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: uploadAnAttachmentToAnIssue
    parameters:
    - name: issue_id
      in: path
      description: The issue id
      required: true
      schema:
        type: string
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /repositories/{workspace}/{repo_slug}/issues/{issue_id}/attachments/{path}:
    delete:
      tags:
      - Issue tracker
      description: Deletes an attachment.
      summary: Delete an attachment for an issue
      responses:
        '204':
          description: Indicates that the deletion was successful
        '401':
          description: If the issue tracker is private and the request was not authenticated.
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue:write
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: deleteAnAttachmentForAnIssue
    get:
      tags:
      - Issue tracker
      description: 'Returns the contents of the specified file attachment.


        Note that this endpoint does not return a JSON response, but instead

        returns a redirect pointing to the actual file that in turn will return

        the raw contents.


        The redirect URL contains a one-time token that has a limited lifetime.

        As a result, the link should not be persisted, stored, or shared.'
      summary: Get attachment for an issue
      responses:
        '302':
          description: A redirect to the file's contents
          headers:
            Location:
              schema:
                type: string
        '401':
          description: If the issue tracker is private and the request was not authenticated.
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getAttachmentForAnIssue
    parameters:
    - name: issue_id
      in: path
      description: The issue id
      required: true
      schema:
        type: string
    - name: path
      in: path
      description: Path to the file.
      required: true
      schema:
        type: string
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /repositories/{workspace}/{repo_slug}/issues/{issue_id}/changes:
    get:
      tags:
      - Issue tracker
      description: "Returns the list of all changes that have been made to the specified\n\
        issue. Changes are returned in chronological order with the oldest\nchange\
        \ first.\n\nEach time an issue is edited in the UI or through the API, an\
        \ immutable\nchange record is created under the `/issues/123/changes` endpoint.\
        \ It\nalso has a comment associated with the change.\n\nNote that this operation\
        \ is changing significantly, due to privacy changes.\nSee the [announcement](https://developer.atlassian.com/cloud/bitbucket/bitbucket-api-changes-gdpr/#changes-to-the-issue-changes-api)\n\
        for details.\n\nChanges support [filtering and sorting](/cloud/bitbucket/rest/intro/#filtering)\
        \ that\ncan be used to search for specific changes. For instance, to see\n\
        when an issue transitioned to \"resolved\":\n\n```\n$ curl -s https://api.bitbucket.org/2.0/repositories/site/master/issues/1/changes\
        \ \\\n   -G --data-urlencode='q=changes.state.new = \"resolved\"'\n```\n\n\
        This resource is only available on repositories that have the issue\ntracker\
        \ enabled.\n\nN.B.\n\nThe `changes.assignee` and `changes.assignee_account_id`\
        \ fields are not\na `user` object. Instead, they contain the raw `username`\
        \ and\n`account_id` of the user. This is to protect the integrity of the audit\n\
        log even after a user account gets deleted.\n\nThe `changes.assignee` field\
        \ is deprecated will disappear in the\nfuture. Use `changes.assignee_account_id`\
        \ instead."
      summary: List changes on an issue
      responses:
        '200':
          description: Returns all the issue changes that were made on the specified
            issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_log_entries'
              examples:
                response:
                  value:
                    pagelen: 20
                    values:
                    - changes:
                        priority:
                          new: trivial
                          old: major
                        assignee:
                          new: ''
                          old: evzijst
                        assignee_account_id:
                          new: ''
                          old: 557058:c0b72ad0-1cb5-4018-9cdc-0cde8492c443
                        kind:
                          new: enhancement
                          old: bug
                      links:
                        self:
                          href: https://api.bitbucket.org/2.0/repositories/evzijst/dogslow/issues/1/changes/2
                        html:
                          href: https://bitbucket.org/evzijst/dogslow/issues/1#comment-2
                      issue:
                        links:
                          self:
                            href: https://api.bitbucket.org/2.0/repositories/evzijst/dogslow/issues/1
                        type: issue
                        id: 1
                        repository:
                          links:
                            self:
                              href: https://api.bitbucket.org/2.0/repositories/evzijst/dogslow
                            html:
                              href: https://bitbucket.org/evzijst/dogslow
                            avatar:
                              href: https://bitbucket.org/evzijst/dogslow/avatar/32/
                          type: repository
                          name: dogslow
                          full_name: evzijst/dogslow
                          uuid: '{988b17c6-1a47-4e70-84ee-854d5f012bf6}'
                        title: Updated title
                      created_on: '2018-03-03T00:35:28.353630+00:00'
                      user:
                        username: evzijst
                        nickname: evzijst
                        display_name: evzijst
                        type: user
                        uuid: '{aaa7972b-38af-4fb1-802d-6e3854c95778}'
                        links:
                          self:
                            href: https://api.bitbucket.org/2.0/users/evzijst
                          html:
                            href: https://bitbucket.org/evzijst/
                          avatar:
                            href: https://bitbucket.org/account/evzijst/avatar/32/
                      message:
                        raw: Removed assignee, changed kind and priority.
                        markup: markdown
                        html: <p>Removed assignee, changed kind and priority.</p>
                        type: rendered
                      type: issue_change
                      id: 2
                    page: 1
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: q
        in: query
        description: '

          Query string to narrow down the response. See

          [filtering and sorting](/cloud/bitbucket/rest/intro/#filtering) for details.'
        required: false
        schema:
          type: string
      - name: sort
        in: query
        description: '

          Name of a response property to sort results. See

          [filtering and sorting](/cloud/bitbucket/rest/intro/#sorting-query-results)

          for details.

          '
        required: false
        schema:
          type: string
      security:
      - oauth2:
        - issue
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listChangesOnAnIssue
    post:
      tags:
      - Issue tracker
      description: "Makes a change to the specified issue.\n\nFor example, to change\
        \ an issue's state and assignee, create a new\nchange object that modifies\
        \ these fields:\n\n```\ncurl https://api.bitbucket.org/2.0/site/master/issues/1234/changes\
        \ \\\n  -s -u evzijst -X POST -H \"Content-Type: application/json\" \\\n \
        \ -d '{\n    \"changes\": {\n      \"assignee_account_id\": {\n        \"\
        new\": \"557058:c0b72ad0-1cb5-4018-9cdc-0cde8492c443\"\n      },\n      \"\
        state\": {\n        \"new\": 'resolved\"\n      }\n    }\n    \"message\"\
        : {\n      \"raw\": \"This is now resolved.\"\n    }\n  }'\n```\n\nThe above\
        \ example also includes a custom comment to go alongside the\nchange. This\
        \ comment will also be visible on the issue page in the UI.\n\nThe fields\
        \ of the `changes` object are strings, not objects. This\nallows for immutable\
        \ change log records, even after user accounts,\nmilestones, or other objects\
        \ recorded in a change entry, get renamed or\ndeleted.\n\nThe `assignee_account_id`\
        \ field stores the account id. When POSTing a\nnew change and changing the\
        \ assignee, the client should therefore use\nthe user's account_id in the\
        \ `changes.assignee_account_id.new` field.\n\nThis call requires authentication.\
        \ Private repositories or private\nissue trackers require the caller to authenticate\
        \ with an account that\nhas appropriate authorization."
      summary: Modify the state of an issue
      responses:
        '201':
          description: The newly created issue change.
          headers:
            Location:
              description: The (absolute) URL of the newly created issue change.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/issue_change'
        '401':
          description: When the request wasn't authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: When the authenticated user isn't authorized to modify the
            issue.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: The specified repository or issue does not exist or does not
            have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/issue_change'
        description: The new issue state change. The only required elements are `changes.[].new`.
          All other elements can be omitted from the body.
        required: true
      security:
      - oauth2:
        - issue:write
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
        - write:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: modifyTheStateOfAnIssue
    parameters:
    - name: issue_id
      in: path
      description: The issue id
      required: true
      schema:
        type: string
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /repositories/{workspace}/{repo_slug}/issues/{issue_id}/changes/{change_id}:
    get:
      tags:
      - Issue tracker
      description: 'Returns the specified issue change object.


        This resource is only available on repositories that have the issue

        tracker enabled.'
      summary: Get issue change object
      responses:
        '200':
          description: The specified issue change object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/issue_change'
        '404':
          description: The specified repository or issue change does not exist or
            does not have the issue tracker enabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - issue
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:issue:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getIssueChangeObject
    parameters:
    - name: change_id
      in: path
      description: The issue change id
      required: true
      schema:
        type: string
    - name: issue_id
      in: path
      description: The issue id
      required: true
      schema:
        type: string
    - name: repo_slug
      in: path
      description: 'This can either be the repository slug or the UUID of the repository,

        surrounded by curly-braces, for example: `{repository UUID}`.

        '
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /repositories/{workspace}/{repo_slug}/issues/{issue_id}/comments:
    get:
      tags:
      - Issue tracker
      description: 'Returns a paginated list of all comments that were made on the

        specified issue.


        The default sorting is oldest to newest and can be overridden with

        the `sort` query parameter.


        This endpoint also supports filtering and sorting of the results. See

        [filtering and sorting](/cloud/bitbucket/rest/intro/#filtering) for more details.'
      summary: List comments on an issue
      responses:
        '200':
          description: A paginated list of issue comments.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_issue_comments'
