openapi: 3.0.0
info:
  title: Bitbucket Snippets CLI
  version: '2.0'
  x-cli-command-name: Snippets
  x-cli-command-use: snippets
  x-cli-command-short: Manage Bitbucket snippets
  x-cli-command-long: Commands for listing, creating, updating, and deleting snippets,
    including comments, commits, and file operations.
paths:
  /snippets:
    get:
      tags:
      - Snippets
      description: '**This endpoint is deprecated. Please use the

        [workspace scoped alternative](/cloud/bitbucket/rest/api-group-snippets/#api-snippets-workspace-get).**


        Returns all snippets. Like pull requests, repositories and workspaces, the

        full set of snippets is defined by what the current user has access to.


        This includes all snippets owned by any of the workspaces the user is a member
        of,

        or snippets by other users that the current user is either watching or has
        collaborated

        on (for instance by commenting on it).


        To limit the set of returned snippets, apply the

        `?role=[owner|contributor|member]` query parameter where the roles are

        defined as follows:


        * `owner`: all snippets owned by the current user

        * `contributor`: all snippets owned by, or watched by the current user

        * `member`: created in a workspaces or watched by the current user


        When no role is specified, all public snippets are returned, as well as all

        privately owned snippets watched or commented on.


        The returned response is a normal paginated JSON list. This endpoint

        only supports `application/json` responses and no

        `multipart/form-data` or `multipart/related`. As a result, it is not

        possible to include the file contents.'
      summary: List snippets
      responses:
        '200':
          description: A paginated list of snippets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_snippets'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: role
        in: query
        description: Filter down the result based on the authenticated user's role
          (`owner`, `contributor`, or `member`).
        required: false
        schema:
          type: string
          enum:
          - owner
          - contributor
          - member
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      deprecated: true
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listSnippets
    post:
      tags:
      - Snippets
      description: "Creates a new snippet under the authenticated user's account.\n\
        \nSnippets can contain multiple files. Both text and binary files are\nsupported.\n\
        \nThe simplest way to create a new snippet from a local file:\n\n    $ curl\
        \ -u username:password -X POST https://api.bitbucket.org/2.0/snippets    \
        \           -F file=@image.png\n\nCreating snippets through curl has a few\
        \ limitations and so let's look\nat a more complicated scenario.\n\nSnippets\
        \ are created with a multipart POST. Both `multipart/form-data`\nand `multipart/related`\
        \ are supported. Both allow the creation of\nsnippets with both meta data\
        \ (title, etc), as well as multiple text\nand binary files.\n\nThe main difference\
        \ is that `multipart/related` can use rich encoding\nfor the meta data (currently\
        \ JSON).\n\n\nmultipart/related (RFC-2387)\n----------------------------\n\
        \nThis is the most advanced and efficient way to create a paste.\n\n    POST\
        \ /2.0/snippets/evzijst HTTP/1.1\n    Content-Length: 1188\n    Content-Type:\
        \ multipart/related; start=\"snippet\"; boundary=\"===============1438169132528273974==\"\
        \n    MIME-Version: 1.0\n\n    --===============1438169132528273974==\n  \
        \  Content-Type: application/json; charset=\"utf-8\"\n    MIME-Version: 1.0\n\
        \    Content-ID: snippet\n\n    {\n      \"title\": \"My snippet\",\n    \
        \  \"is_private\": true,\n      \"scm\": \"git\",\n      \"files\": {\n  \
        \        \"foo.txt\": {},\n          \"image.png\": {}\n        }\n    }\n\
        \n    --===============1438169132528273974==\n    Content-Type: text/plain;\
        \ charset=\"us-ascii\"\n    MIME-Version: 1.0\n    Content-Transfer-Encoding:\
        \ 7bit\n    Content-ID: \"foo.txt\"\n    Content-Disposition: attachment;\
        \ filename=\"foo.txt\"\n\n    foo\n\n    --===============1438169132528273974==\n\
        \    Content-Type: image/png\n    MIME-Version: 1.0\n    Content-Transfer-Encoding:\
        \ base64\n    Content-ID: \"image.png\"\n    Content-Disposition: attachment;\
        \ filename=\"image.png\"\n\n    iVBORw0KGgoAAAANSUhEUgAAABQAAAAoCAYAAAD+MdrbAAABD0lEQVR4Ae3VMUoDQRTG8ccUaW2m\n\
        \    TKONFxArJYJamCvkCnZTaa+VnQdJSBFl2SMsLFrEWNjZBZs0JgiL/+KrhhVmJRbCLPx4O+/DT2TB\n\
        \    cbblJxf+UWFVVRNsEGAtgvJxnLm2H+A5RQ93uIl+3632PZyl/skjfOn9Gvdwmlcw5aPUwimG+NT5\n\
        \    EnNN036IaZePUuIcK533NVfal7/5yjWeot2z9ta1cAczHEf7I+3J0ws9Cgx0fsOFpmlfwKcWPuBQ\n\
        \    73Oc4FHzBaZ8llq4q1mr5B2mOUCt815qYR8eB1hG2VJ7j35q4RofaH7IG+Xrf/PfJhfmwtfFYoIN\n\
        \    AqxFUD6OMxcvkO+UfKfkOyXfKdsv/AYCHMLVkHAFWgAAAABJRU5ErkJggg==\n    --===============1438169132528273974==--\n\
        \nThe request contains multiple parts and is structured as follows.\n\nThe\
        \ first part is the JSON document that describes the snippet's\nproperties\
        \ or meta data. It either has to be the first part, or the\nrequest's `Content-Type`\
        \ header must contain the `start` parameter to\npoint to it.\n\nThe remaining\
        \ parts are the files of which there can be zero or more.\nEach file part\
        \ should contain the `Content-ID` MIME header through\nwhich the JSON meta\
        \ data's `files` element addresses it. The value\nshould be the name of the\
        \ file.\n\n`Content-Disposition` is an optional MIME header. The header's\n\
        optional `filename` parameter can be used to specify the file name\nthat Bitbucket\
        \ should use when writing the file to disk. When present,\n`filename` takes\
        \ precedence over the value of `Content-ID`.\n\nWhen the JSON body omits the\
        \ `files` element, the remaining parts are\nnot ignored. Instead, each file\
        \ is added to the new snippet as if its\nname was explicitly linked (the use\
        \ of the `files` elements is\nmandatory for some operations like deleting\
        \ or renaming files).\n\n\nmultipart/form-data\n-------------------\n\nThe\
        \ use of JSON for the snippet's meta data is optional. Meta data can\nalso\
        \ be supplied as regular form fields in a more conventional\n`multipart/form-data`\
        \ request:\n\n    $ curl -X POST -u credentials https://api.bitbucket.org/2.0/snippets\
        \               -F title=\"My snippet\"               -F file=@foo.txt -F\
        \ file=@image.png\n\n    POST /2.0/snippets HTTP/1.1\n    Content-Length:\
        \ 951\n    Content-Type: multipart/form-data; boundary=----------------------------63a4b224c59f\n\
        \n    ------------------------------63a4b224c59f\n    Content-Disposition:\
        \ form-data; name=\"file\"; filename=\"foo.txt\"\n    Content-Type: text/plain\n\
        \n    foo\n\n    ------------------------------63a4b224c59f\n    Content-Disposition:\
        \ form-data; name=\"file\"; filename=\"image.png\"\n    Content-Type: application/octet-stream\n\
        \n    ?PNG\n\n    IHDR?1??I.....\n    ------------------------------63a4b224c59f\n\
        \    Content-Disposition: form-data; name=\"title\"\n\n    My snippet\n  \
        \  ------------------------------63a4b224c59f--\n\nHere the meta data properties\
        \ are included as flat, top-level form\nfields. The file attachments use the\
        \ `file` field name. To attach\nmultiple files, simply repeat the field.\n\
        \nThe advantage of `multipart/form-data` over `multipart/related` is\nthat\
        \ it can be easier to build clients.\n\nEssentially all properties are optional,\
        \ `title` and `files` included.\n\n\nSharing and Visibility\n----------------------\n\
        \nSnippets can be either public (visible to anyone on Bitbucket, as well\n\
        as anonymous users), or private (visible only to members of the workspace).\n\
        This is controlled through the snippet's `is_private` element:\n\n* **is_private=false**\
        \ -- everyone, including anonymous users can view\n  the snippet\n* **is_private=true**\
        \ -- only workspace members can view the snippet\n\nTo create the snippet\
        \ under a workspace, just append the workspace ID\nto the URL. See [`/2.0/snippets/{workspace}`](/cloud/bitbucket/rest/api-group-snippets/#api-snippets-workspace-post)."
      summary: Create a snippet
      responses:
        '201':
          description: The newly created snippet object.
          headers:
            Location:
              description: The URL of the newly created snippet.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/snippet'
        '401':
          description: If the request was not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        $ref: '#/components/requestBodies/snippet'
      security:
      - oauth2:
        - snippet:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
        - write:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: createASnippet
    parameters: []
  /snippets/{workspace}:
    get:
      tags:
      - Snippets
      description: 'Identical to [`/snippets`](/cloud/bitbucket/rest/api-group-snippets/#api-snippets-get),
        except that the result is further filtered

        by the snippet owner and only those that are owned by `{workspace}` are

        returned.'
      summary: List snippets in a workspace
      responses:
        '200':
          description: A paginated list of snippets.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_snippets'
        '404':
          description: If the user does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: role
        in: query
        description: Filter down the result based on the authenticated user's role
          (`owner`, `contributor`, or `member`).
        required: false
        schema:
          type: string
          enum:
          - owner
          - contributor
          - member
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: listSnippetsInAWorkspace
    post:
      tags:
      - Snippets
      description: 'Identical to [`/snippets`](/cloud/bitbucket/rest/api-group-snippets/#api-snippets-post),
        except that the new snippet will be

        created under the workspace specified in the path parameter

        `{workspace}`.'
      summary: Create a snippet for a workspace
      responses:
        '201':
          description: The newly created snippet object.
          headers:
            Location:
              description: The URL of the newly created snippet.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/snippet'
        '401':
          description: If the request was not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If the authenticated user does not have permission to create
            snippets in the specified workspace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      requestBody:
        $ref: '#/components/requestBodies/snippet'
      security:
      - oauth2:
        - snippet:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
        - write:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: createASnippetForAWorkspace
    parameters:
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /snippets/{workspace}/{encoded_id}:
    delete:
      tags:
      - Snippets
      description: Deletes a snippet and returns an empty response.
      summary: Delete a snippet
      responses:
        '204':
          description: If the snippet was deleted successfully.
        '401':
          description: If the snippet is private and the request was not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If authenticated user does not have permission to delete the
            private snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - delete:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: deleteASnippet
    get:
      tags:
      - Snippets
      description: "Retrieves a single snippet.\n\nSnippets support multiple content\
        \ types:\n\n* application/json\n* multipart/related\n* multipart/form-data\n\
        \n\napplication/json\n----------------\n\nThe default content type of the\
        \ response is `application/json`.\nSince JSON is always `utf-8`, it cannot\
        \ reliably contain file contents\nfor files that are not text. Therefore,\
        \ JSON snippet documents only\ncontain the filename and links to the file\
        \ contents.\n\nThis means that in order to retrieve all parts of a snippet,\
        \ N+1\nrequests need to be made (where N is the number of files in the\nsnippet).\n\
        \n\nmultipart/related\n-----------------\n\nTo retrieve an entire snippet\
        \ in a single response, use the\n`Accept: multipart/related` HTTP request\
        \ header.\n\n    $ curl -H \"Accept: multipart/related\" https://api.bitbucket.org/2.0/snippets/evzijst/1\n\
        \nResponse:\n\n    HTTP/1.1 200 OK\n    Content-Length: 2214\n    Content-Type:\
        \ multipart/related; start=\"snippet\"; boundary=\"===============1438169132528273974==\"\
        \n    MIME-Version: 1.0\n\n    --===============1438169132528273974==\n  \
        \  Content-Type: application/json; charset=\"utf-8\"\n    MIME-Version: 1.0\n\
        \    Content-ID: snippet\n\n    {\n      \"links\": {\n        \"self\": {\n\
        \          \"href\": \"https://api.bitbucket.org/2.0/snippets/evzijst/kypj\"\
        \n        },\n        \"html\": {\n          \"href\": \"https://bitbucket.org/snippets/evzijst/kypj\"\
        \n        },\n        \"comments\": {\n          \"href\": \"https://api.bitbucket.org/2.0/snippets/evzijst/kypj/comments\"\
        \n        },\n        \"watchers\": {\n          \"href\": \"https://api.bitbucket.org/2.0/snippets/evzijst/kypj/watchers\"\
        \n        },\n        \"commits\": {\n          \"href\": \"https://api.bitbucket.org/2.0/snippets/evzijst/kypj/commits\"\
        \n        }\n      },\n      \"id\": kypj,\n      \"title\": \"My snippet\"\
        ,\n      \"created_on\": \"2014-12-29T22:22:04.790331+00:00\",\n      \"updated_on\"\
        : \"2014-12-29T22:22:04.790331+00:00\",\n      \"is_private\": false,\n  \
        \    \"files\": {\n        \"foo.txt\": {\n          \"links\": {\n      \
        \      \"self\": {\n              \"href\": \"https://api.bitbucket.org/2.0/snippets/evzijst/kypj/files/367ab19/foo.txt\"\
        \n            },\n            \"html\": {\n              \"href\": \"https://bitbucket.org/snippets/evzijst/kypj#file-foo.txt\"\
        \n            }\n          }\n        },\n        \"image.png\": {\n     \
        \     \"links\": {\n            \"self\": {\n              \"href\": \"https://api.bitbucket.org/2.0/snippets/evzijst/kypj/files/367ab19/image.png\"\
        \n            },\n            \"html\": {\n              \"href\": \"https://bitbucket.org/snippets/evzijst/kypj#file-image.png\"\
        \n            }\n          }\n        }\n      ],\n      \"owner\": {\n  \
        \      \"username\": \"evzijst\",\n        \"nickname\": \"evzijst\",\n  \
        \      \"display_name\": \"Erik van Zijst\",\n        \"uuid\": \"{d301aafa-d676-4ee0-88be-962be7417567}\"\
        ,\n        \"links\": {\n          \"self\": {\n            \"href\": \"https://api.bitbucket.org/2.0/users/evzijst\"\
        \n          },\n          \"html\": {\n            \"href\": \"https://bitbucket.org/evzijst\"\
        \n          },\n          \"avatar\": {\n            \"href\": \"https://bitbucket-staging-assetroot.s3.amazonaws.com/c/photos/2013/Jul/31/erik-avatar-725122544-0_avatar.png\"\
        \n          }\n        }\n      },\n      \"creator\": {\n        \"username\"\
        : \"evzijst\",\n        \"nickname\": \"evzijst\",\n        \"display_name\"\
        : \"Erik van Zijst\",\n        \"uuid\": \"{d301aafa-d676-4ee0-88be-962be7417567}\"\
        ,\n        \"links\": {\n          \"self\": {\n            \"href\": \"https://api.bitbucket.org/2.0/users/evzijst\"\
        \n          },\n          \"html\": {\n            \"href\": \"https://bitbucket.org/evzijst\"\
        \n          },\n          \"avatar\": {\n            \"href\": \"https://bitbucket-staging-assetroot.s3.amazonaws.com/c/photos/2013/Jul/31/erik-avatar-725122544-0_avatar.png\"\
        \n          }\n        }\n      }\n    }\n\n    --===============1438169132528273974==\n\
        \    Content-Type: text/plain; charset=\"us-ascii\"\n    MIME-Version: 1.0\n\
        \    Content-Transfer-Encoding: 7bit\n    Content-ID: \"foo.txt\"\n    Content-Disposition:\
        \ attachment; filename=\"foo.txt\"\n\n    foo\n\n    --===============1438169132528273974==\n\
        \    Content-Type: image/png\n    MIME-Version: 1.0\n    Content-Transfer-Encoding:\
        \ base64\n    Content-ID: \"image.png\"\n    Content-Disposition: attachment;\
        \ filename=\"image.png\"\n\n    iVBORw0KGgoAAAANSUhEUgAAABQAAAAoCAYAAAD+MdrbAAABD0lEQVR4Ae3VMUoDQRTG8ccUaW2m\n\
        \    TKONFxArJYJamCvkCnZTaa+VnQdJSBFl2SMsLFrEWNjZBZs0JgiL/+KrhhVmJRbCLPx4O+/DT2TB\n\
        \    cbblJxf+UWFVVRNsEGAtgvJxnLm2H+A5RQ93uIl+3632PZyl/skjfOn9Gvdwmlcw5aPUwimG+NT5\n\
        \    EnNN036IaZePUuIcK533NVfal7/5yjWeot2z9ta1cAczHEf7I+3J0ws9Cgx0fsOFpmlfwKcWPuBQ\n\
        \    73Oc4FHzBaZ8llq4q1mr5B2mOUCt815qYR8eB1hG2VJ7j35q4RofaH7IG+Xrf/PfJhfmwtfFYoIN\n\
        \    AqxFUD6OMxcvkO+UfKfkOyXfKdsv/AYCHMLVkHAFWgAAAABJRU5ErkJggg==\n    --===============1438169132528273974==--\n\
        \nmultipart/form-data\n-------------------\n\nAs with creating new snippets,\
        \ `multipart/form-data` can be used as an\nalternative to `multipart/related`.\
        \ However, the inherently flat\nstructure of form-data means that only basic,\
        \ root-level properties\ncan be returned, while nested elements like `links`\
        \ are omitted:\n\n    $ curl -H \"Accept: multipart/form-data\" https://api.bitbucket.org/2.0/snippets/evzijst/kypj\n\
        \nResponse:\n\n    HTTP/1.1 200 OK\n    Content-Length: 951\n    Content-Type:\
        \ multipart/form-data; boundary=----------------------------63a4b224c59f\n\
        \n    ------------------------------63a4b224c59f\n    Content-Disposition:\
        \ form-data; name=\"title\"\n    Content-Type: text/plain; charset=\"utf-8\"\
        \n\n    My snippet\n    ------------------------------63a4b224c59f--\n   \
        \ Content-Disposition: attachment; name=\"file\"; filename=\"foo.txt\"\n \
        \   Content-Type: text/plain\n\n    foo\n\n    ------------------------------63a4b224c59f\n\
        \    Content-Disposition: attachment; name=\"file\"; filename=\"image.png\"\
        \n    Content-Transfer-Encoding: base64\n    Content-Type: application/octet-stream\n\
        \n    iVBORw0KGgoAAAANSUhEUgAAABQAAAAoCAYAAAD+MdrbAAABD0lEQVR4Ae3VMUoDQRTG8ccUaW2m\n\
        \    TKONFxArJYJamCvkCnZTaa+VnQdJSBFl2SMsLFrEWNjZBZs0JgiL/+KrhhVmJRbCLPx4O+/DT2TB\n\
        \    cbblJxf+UWFVVRNsEGAtgvJxnLm2H+A5RQ93uIl+3632PZyl/skjfOn9Gvdwmlcw5aPUwimG+NT5\n\
        \    EnNN036IaZePUuIcK533NVfal7/5yjWeot2z9ta1cAczHEf7I+3J0ws9Cgx0fsOFpmlfwKcWPuBQ\n\
        \    73Oc4FHzBaZ8llq4q1mr5B2mOUCt815qYR8eB1hG2VJ7j35q4RofaH7IG+Xrf/PfJhfmwtfFYoIN\n\
        \    AqxFUD6OMxcvkO+UfKfkOyXfKdsv/AYCHMLVkHAFWgAAAABJRU5ErkJggg==\n    ------------------------------5957323a6b76--"
      summary: Get a snippet
      responses:
        '200':
          description: The snippet object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/related:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/snippet'
        '401':
          description: If the snippet is private and the request was not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If authenticated user does not have access to the private snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '410':
          description: If the snippet marked as spam.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getASnippet
    put:
      tags:
      - Snippets
      description: "Used to update a snippet. Use this to add and delete files and\
        \ to\nchange a snippet's title.\n\nTo update a snippet, one can either PUT\
        \ a full snapshot, or only the\nparts that need to be changed.\n\nThe contract\
        \ for PUT on this API is that properties missing from the\nrequest remain\
        \ untouched so that snippets can be efficiently\nmanipulated with differential\
        \ payloads.\n\nTo delete a property (e.g. the title, or a file), include its\
        \ name in\nthe request, but omit its value (use `null`).\n\nAs in Git, explicit\
        \ renaming of files is not supported. Instead, to\nrename a file, delete it\
        \ and add it again under another name. This can\nbe done atomically in a single\
        \ request. Rename detection is left to\nthe SCM.\n\nPUT supports three different\
        \ content types for both request and\nresponse bodies:\n\n* `application/json`\n\
        * `multipart/related`\n* `multipart/form-data`\n\nThe content type used for\
        \ the request body can be different than that\nused for the response. Content\
        \ types are specified using standard HTTP\nheaders.\n\nUse the `Content-Type`\
        \ and `Accept` headers to select the desired\nrequest and response format.\n\
        \n\napplication/json\n----------------\n\nAs with creation and retrieval,\
        \ the content type determines what\nproperties can be manipulated. `application/json`\
        \ does not support\nfile contents and is therefore limited to a snippet's\
        \ meta data.\n\nTo update the title, without changing any of its files:\n\n\
        \    $ curl -X POST -H \"Content-Type: application/json\" https://api.bitbucket.org/2.0/snippets/evzijst/kypj\
        \             -d '{\"title\": \"Updated title\"}'\n\n\nTo delete the title:\n\
        \n    $ curl -X POST -H \"Content-Type: application/json\" https://api.bitbucket.org/2.0/snippets/evzijst/kypj\
        \             -d '{\"title\": null}'\n\nNot all parts of a snippet can be\
        \ manipulated. The owner and creator\nfor instance are immutable.\n\n\nmultipart/related\n\
        -----------------\n\n`multipart/related` can be used to manipulate all of\
        \ a snippet's\nproperties. The body is identical to a POST. properties omitted\
        \ from\nthe request are left unchanged. Since the `start` part contains JSON,\n\
        the mechanism for manipulating the snippet's meta data is identical\nto `application/json`\
        \ requests.\n\nTo update one of a snippet's file contents, while also changing\
        \ its\ntitle:\n\n    PUT /2.0/snippets/evzijst/kypj HTTP/1.1\n    Content-Length:\
        \ 288\n    Content-Type: multipart/related; start=\"snippet\"; boundary=\"\
        ===============1438169132528273974==\"\n    MIME-Version: 1.0\n\n    --===============1438169132528273974==\n\
        \    Content-Type: application/json; charset=\"utf-8\"\n    MIME-Version:\
        \ 1.0\n    Content-ID: snippet\n\n    {\n      \"title\": \"My updated snippet\"\
        ,\n      \"files\": {\n          \"foo.txt\": {}\n        }\n    }\n\n   \
        \ --===============1438169132528273974==\n    Content-Type: text/plain; charset=\"\
        us-ascii\"\n    MIME-Version: 1.0\n    Content-Transfer-Encoding: 7bit\n \
        \   Content-ID: \"foo.txt\"\n    Content-Disposition: attachment; filename=\"\
        foo.txt\"\n\n    Updated file contents.\n\n    --===============1438169132528273974==--\n\
        \nHere only the parts that are changed are included in the body. The\nother\
        \ files remain untouched.\n\nNote the use of the `files` list in the JSON\
        \ part. This list contains\nthe files that are being manipulated. This list\
        \ should have\ncorresponding multiparts in the request that contain the new\
        \ contents\nof these files.\n\nIf a filename in the `files` list does not\
        \ have a corresponding part,\nit will be deleted from the snippet, as shown\
        \ below:\n\n    PUT /2.0/snippets/evzijst/kypj HTTP/1.1\n    Content-Length:\
        \ 188\n    Content-Type: multipart/related; start=\"snippet\"; boundary=\"\
        ===============1438169132528273974==\"\n    MIME-Version: 1.0\n\n    --===============1438169132528273974==\n\
        \    Content-Type: application/json; charset=\"utf-8\"\n    MIME-Version:\
        \ 1.0\n    Content-ID: snippet\n\n    {\n      \"files\": {\n        \"image.png\"\
        : {}\n      }\n    }\n\n    --===============1438169132528273974==--\n\nTo\
        \ simulate a rename, delete a file and add the same file under\nanother name:\n\
        \n    PUT /2.0/snippets/evzijst/kypj HTTP/1.1\n    Content-Length: 212\n \
        \   Content-Type: multipart/related; start=\"snippet\"; boundary=\"===============1438169132528273974==\"\
        \n    MIME-Version: 1.0\n\n    --===============1438169132528273974==\n  \
        \  Content-Type: application/json; charset=\"utf-8\"\n    MIME-Version: 1.0\n\
        \    Content-ID: snippet\n\n    {\n        \"files\": {\n          \"foo.txt\"\
        : {},\n          \"bar.txt\": {}\n        }\n    }\n\n    --===============1438169132528273974==\n\
        \    Content-Type: text/plain; charset=\"us-ascii\"\n    MIME-Version: 1.0\n\
        \    Content-Transfer-Encoding: 7bit\n    Content-ID: \"bar.txt\"\n    Content-Disposition:\
        \ attachment; filename=\"bar.txt\"\n\n    foo\n\n    --===============1438169132528273974==--\n\
        \n\nmultipart/form-data\n-----------------\n\nAgain, one can also use `multipart/form-data`\
        \ to manipulate file\ncontents and meta data atomically.\n\n    $ curl -X\
        \ PUT http://localhost:12345/2.0/snippets/evzijst/kypj             -F title=\"\
        My updated snippet\" -F file=@foo.txt\n\n    PUT /2.0/snippets/evzijst/kypj\
        \ HTTP/1.1\n    Content-Length: 351\n    Content-Type: multipart/form-data;\
        \ boundary=----------------------------63a4b224c59f\n\n    ------------------------------63a4b224c59f\n\
        \    Content-Disposition: form-data; name=\"file\"; filename=\"foo.txt\"\n\
        \    Content-Type: text/plain\n\n    foo\n\n    ------------------------------63a4b224c59f\n\
        \    Content-Disposition: form-data; name=\"title\"\n\n    My updated snippet\n\
        \    ------------------------------63a4b224c59f\n\nTo delete a file, omit\
        \ its contents while including its name in the\n`files` field:\n\n    $ curl\
        \ -X PUT https://api.bitbucket.org/2.0/snippets/evzijst/kypj -F files=image.png\n\
        \n    PUT /2.0/snippets/evzijst/kypj HTTP/1.1\n    Content-Length: 149\n \
        \   Content-Type: multipart/form-data; boundary=----------------------------ef8871065a86\n\
        \n    ------------------------------ef8871065a86\n    Content-Disposition:\
        \ form-data; name=\"files\"\n\n    image.png\n    ------------------------------ef8871065a86--\n\
        \nThe explicit use of the `files` element in `multipart/related` and\n`multipart/form-data`\
        \ is only required when deleting files.\nThe default mode of operation is\
        \ for file parts to be processed,\nregardless of whether or not they are listed\
        \ in `files`, as a\nconvenience to the client."
      summary: Update a snippet
      responses:
        '200':
          description: The updated snippet object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/related:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/snippet'
        '401':
          description: If the snippet is private and the request was not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If authenticated user does not have permission to update the
            private snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
        - write:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: updateASnippet
    parameters:
    - name: encoded_id
      in: path
      description: The snippet id.
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /snippets/{workspace}/{encoded_id}/comments:
    get:
      tags:
