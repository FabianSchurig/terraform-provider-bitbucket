      description: 'Deletes the snippet.


        Note that this only works for versioned URLs that point to the latest

        commit of the snippet. Pointing to an older commit results in a 405

        status code.


        To delete a snippet, regardless of whether or not concurrent changes

        are being made to it, use `DELETE /snippets/{encoded_id}` instead.'
      summary: Delete a previous revision of a snippet
      responses:
        '204':
          description: If the snippet was deleted successfully.
        '401':
          description: If the snippet is private and the request was not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If authenticated user does not have permission to delete the
            private snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '405':
          description: If `{node_id}` is not the latest revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: deleteAPreviousRevisionOfASnippet
    get:
      tags:
      - Snippets
      description: 'Identical to `GET /snippets/encoded_id`, except that this endpoint

        can be used to retrieve the contents of the snippet as it was at an

        older revision, while `/snippets/encoded_id` always returns the

        snippet''s current revision.


        Note that only the snippet''s file contents are versioned, not its

        meta data properties like the title.


        Other than that, the two endpoints are identical in behavior.'
      summary: Get a previous revision of a snippet
      responses:
        '200':
          description: The snippet object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/related:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/snippet'
        '401':
          description: If the snippet is private and the request was not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If authenticated user does not have access to the private snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet, or the revision does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getAPreviousRevisionOfASnippet
    put:
      tags:
      - Snippets
      description: 'Identical to `UPDATE /snippets/encoded_id`, except that this endpoint

        takes an explicit commit revision. Only the snippet''s "HEAD"/"tip"

        (most recent) version can be updated and requests on all other,

        older revisions fail by returning a 405 status.


        Usage of this endpoint over the unrestricted `/snippets/encoded_id`

        could be desired if the caller wants to be sure no concurrent

        modifications have taken place between the moment of the UPDATE

        request and the original GET.


        This can be considered a so-called "Compare And Swap", or CAS

        operation.


        Other than that, the two endpoints are identical in behavior.'
      summary: Update a previous revision of a snippet
      responses:
        '200':
          description: The updated snippet object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/related:
              schema:
                $ref: '#/components/schemas/snippet'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/snippet'
        '401':
          description: If the snippet is private and the request was not authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '403':
          description: If authenticated user does not have permission to update the
            private snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet or the revision does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
        '405':
          description: If `{node_id}` is not the latest revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
            multipart/related:
              schema:
                $ref: '#/components/schemas/error'
            multipart/form-data:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
        - write:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: updateAPreviousRevisionOfASnippet
    parameters:
    - name: encoded_id
      in: path
      description: The snippet id.
      required: true
      schema:
        type: string
    - name: node_id
      in: path
      description: A commit revision (SHA1).
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /snippets/{workspace}/{encoded_id}/{node_id}/files/{path}:
    get:
      tags:
      - Snippets
      description: 'Retrieves the raw contents of a specific file in the snippet.
        The

        `Content-Disposition` header will be "attachment" to avoid issues with

        malevolent executable files.


        The file''s mime type is derived from its filename and returned in the

        `Content-Type` header.


        Note that for text files, no character encoding is included as part of

        the content type.'
      summary: Get a snippet's raw file
      responses:
        '200':
          description: Returns the contents of the specified file.
          headers:
            Content-Type:
              description: The mime type as derived from the filename
              schema:
                type: string
            Content-Disposition:
              description: attachment
              schema:
                type: string
        '403':
          description: If the authenticated user does not have access to the snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the file or snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getASnippetsRawFile
    parameters:
    - name: encoded_id
      in: path
      description: The snippet id.
      required: true
      schema:
        type: string
    - name: node_id
      in: path
      description: A commit revision (SHA1).
      required: true
      schema:
        type: string
    - name: path
      in: path
      description: Path to the file.
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /snippets/{workspace}/{encoded_id}/{revision}/diff:
    get:
      tags:
      - Snippets
      description: "Returns the diff of the specified commit against its first parent.\n\
        \nNote that this resource is different in functionality from the `patch`\n\
        resource.\n\nThe differences between a diff and a patch are:\n\n* patches\
        \ have a commit header with the username, message, etc\n* diffs support the\
        \ optional `path=foo/bar.py` query param to filter the\n  diff to just that\
        \ one file diff (not supported for patches)\n* for a merge, the diff will\
        \ show the diff between the merge commit and\n  its first parent (identical\
        \ to how PRs work), while patch returns a\n  response containing separate\
        \ patches for each commit on the second\n  parent's ancestry, up to the oldest\
        \ common ancestor (identical to\n  its reachability).\n\nNote that the character\
        \ encoding of the contents of the diff is\nunspecified as Git does not track\
        \ this, making it hard for\nBitbucket to reliably determine this."
      summary: Get snippet changes between versions
      responses:
        '200':
          description: The raw diff contents.
        '403':
          description: If the authenticated user does not have access to the snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: path
        in: query
        description: When used, only one the diff of the specified file will be returned.
        schema:
          type: string
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getSnippetChangesBetweenVersions
    parameters:
    - name: encoded_id
      in: path
      description: The snippet id.
      required: true
      schema:
        type: string
    - name: revision
      in: path
      description: A revspec expression. This can simply be a commit SHA1, a ref name,
        or a compare expression like `staging..production`.
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

        surrounded by curly-braces, for example: `{workspace UUID}`.

        '
      required: true
      schema:
        type: string
  /snippets/{workspace}/{encoded_id}/{revision}/patch:
    get:
      tags:
      - Snippets
      description: "Returns the patch of the specified commit against its first\n\
        parent.\n\nNote that this resource is different in functionality from the\
        \ `diff`\nresource.\n\nThe differences between a diff and a patch are:\n\n\
        * patches have a commit header with the username, message, etc\n* diffs support\
        \ the optional `path=foo/bar.py` query param to filter the\n  diff to just\
        \ that one file diff (not supported for patches)\n* for a merge, the diff\
        \ will show the diff between the merge commit and\n  its first parent (identical\
        \ to how PRs work), while patch returns a\n  response containing separate\
        \ patches for each commit on the second\n  parent's ancestry, up to the oldest\
        \ common ancestor (identical to\n  its reachability).\n\nNote that the character\
        \ encoding of the contents of the patch is\nunspecified as Git does not track\
        \ this, making it hard for\nBitbucket to reliably determine this."
      summary: Get snippet patch between versions
      responses:
        '200':
          description: The raw patch contents.
        '403':
          description: If the authenticated user does not have access to the snippet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the snippet does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      security:
      - oauth2:
        - snippet
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:snippet:bitbucket
      x-atlassian-auth-types:
      - api-token
      operationId: getSnippetPatchBetweenVersions
    parameters:
    - name: encoded_id
      in: path
      description: The snippet id.
      required: true
      schema:
        type: string
    - name: revision
      in: path
      description: A revspec expression. This can simply be a commit SHA1, a ref name,
        or a compare expression like `staging..production`.
      required: true
      schema:
        type: string
    - name: workspace
      in: path
      description: 'This can either be the workspace ID (slug) or the workspace UUID

