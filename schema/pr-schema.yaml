  /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/merge/task-status/{task_id}:
    get:
      tags:
      - Pullrequests
      description: "When merging a pull request takes too long, the client receives\
        \ a\ntask ID along with a 202 status code. The task ID can be used in a call\n\
        to this endpoint to check the status of a merge task.\n\n```\ncurl -X GET\
        \ https://api.bitbucket.org/2.0/repositories/atlassian/bitbucket/pullrequests/2286/merge/task-status/<task_id>\n\
        ```\n\nIf the merge task is not yet finished, a PENDING status will be returned.\n\
        \n```\nHTTP/2 200\n{\n    \"task_status\": \"PENDING\",\n    \"links\": {\n\
        \        \"self\": {\n            \"href\": \"https://api.bitbucket.org/2.0/repositories/atlassian/bitbucket/pullrequests/2286/merge/task-status/<task_id>\"\
        \n        }\n    }\n}\n```\n\nIf the merge was successful, a SUCCESS status\
        \ will be returned.\n\n```\nHTTP/2 200\n{\n    \"task_status\": \"SUCCESS\"\
        ,\n    \"links\": {\n        \"self\": {\n            \"href\": \"https://api.bitbucket.org/2.0/repositories/atlassian/bitbucket/pullrequests/2286/merge/task-status/<task_id>\"\
        \n        }\n    },\n    \"merge_result\": <the merged pull request object>\n\
        }\n```\n\nIf the merge task failed, an error will be returned.\n\n```\n{\n\
        \    \"type\": \"error\",\n    \"error\": {\n        \"message\": \"<error\
        \ message>\"\n    }\n}\n```"
      summary: Get the merge task status for a pull request
      responses:
        '200':
          description: Returns a task status if the merge is either pending or successful,
            and if it is successful, a pull request
        '400':
          description: If the provided task ID does not relate to this pull request,
            or if something went wrong during the merge operation
        '403':
          description: The user making the request does not have permission to the
            repo and is different from the user who queued the task
        '409':
          description: Unable to merge because one of the refs involved changed while
            attempting to merge
      security:
      - oauth2:
        - pullrequest
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:pullrequest:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: getTheMergeTaskStatusForAPullRequest
    parameters:
    - name: pull_request_id
      in: path
      description: The id of the pull request.
      required: true
      schema:
        type: integer
