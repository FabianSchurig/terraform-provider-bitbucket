openapi: 3.0.0
info:
  title: Bitbucket Pull Requests CLI
  version: 2.0.0
paths:
  /repositories/{workspace}/{repo_slug}/pullrequests:
    get:
      tags:
        - Pullrequests
      summary: List pull requests
      operationId: listPullRequests
      description: Returns all pull requests on the specified repository.
      parameters:
        - name: workspace
          in: path
          required: true
          schema:
            type: string
        - name: repo_slug
          in: path
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum:
              - OPEN
              - MERGED
              - DECLINED
              - SUPERSEDED
      responses:
        "200":
          description: A paginated list of pull requests.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_pullrequests'
        "401":
          description: Unauthorized
        "404":
          description: Repository not found
    post:
      tags:
        - Pullrequests
      summary: Create a pull request
      operationId: createPullRequest
      description: Creates a new pull request.
      parameters:
        - name: workspace
          in: path
          required: true
          schema:
            type: string
        - name: repo_slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pullrequest'
      responses:
        "201":
          description: The pull request was created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pullrequest'
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "404":
          description: Repository not found
  /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}:
    get:
      tags:
        - Pullrequests
      summary: Get a pull request
      operationId: getPullRequest
      description: Returns the specified pull request.
      parameters:
        - name: workspace
          in: path
          required: true
          schema:
            type: string
        - name: repo_slug
          in: path
          required: true
          schema:
            type: string
        - name: pull_request_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: The pull request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pullrequest'
        "401":
          description: Unauthorized
        "404":
          description: Pull request not found
  /repositories/{workspace}/{repo_slug}/pullrequests/{pull_request_id}/merge:
    post:
      tags:
        - Pullrequests
      summary: Merge a pull request
      operationId: mergePullRequest
      description: Merges the pull request.
      parameters:
        - name: workspace
          in: path
          required: true
          schema:
            type: string
        - name: repo_slug
          in: path
          required: true
          schema:
            type: string
        - name: pull_request_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/pullrequest_merge_parameters'
      responses:
        "200":
          description: The pull request was merged.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/pullrequest'
        "401":
          description: Unauthorized
        "404":
          description: Pull request not found

components:
  schemas:
    pullrequest:
      type: object
      properties:
        id:
          type: integer
          description: The pull request's unique ID.
        title:
          type: string
          description: Title of the pull request.
        description:
          type: string
          description: Explains what the pull request does.
        state:
          type: string
          enum:
            - OPEN
            - MERGED
            - DECLINED
            - SUPERSEDED
          description: The pull request's current state.
        source:
          $ref: '#/components/schemas/pullrequest_endpoint'
        destination:
          $ref: '#/components/schemas/pullrequest_endpoint'
        author:
          $ref: '#/components/schemas/account'
        reviewers:
          type: array
          items:
            $ref: '#/components/schemas/account'
        participants:
          type: array
          items:
            $ref: '#/components/schemas/participant'
        created_on:
          type: string
          format: date-time
        updated_on:
          type: string
          format: date-time
        links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            html:
              $ref: '#/components/schemas/link'
            commits:
              $ref: '#/components/schemas/link'
            diff:
              $ref: '#/components/schemas/link'

    paginated_pullrequests:
      type: object
      properties:
        size:
          type: integer
          description: Total number of objects.
        page:
          type: integer
          description: Current page number.
        pagelen:
          type: integer
          description: Maximum number of objects in a single response.
        next:
          type: string
          description: Link to the next page.
        previous:
          type: string
          description: Link to the previous page.
        values:
          type: array
          items:
            $ref: '#/components/schemas/pullrequest'

    pullrequest_endpoint:
      type: object
      properties:
        branch:
          type: object
          properties:
            name:
              type: string
        repository:
          $ref: '#/components/schemas/repository'
        commit:
          type: object
          properties:
            hash:
              type: string

    pullrequest_merge_parameters:
      type: object
      properties:
        type:
          type: string
        message:
          type: string
          description: The commit message that will be used on the resulting commit.
        close_source_branch:
          type: boolean
          description: Whether the source branch should be deleted after the merge.
        merge_strategy:
          type: string
          enum:
            - merge_commit
            - squash
            - fast_forward
          description: The merge strategy that will be used.

    account:
      type: object
      properties:
        uuid:
          type: string
        username:
          type: string
        display_name:
          type: string
        nickname:
          type: string
        links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            html:
              $ref: '#/components/schemas/link'

    participant:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/account'
        role:
          type: string
          enum:
            - AUTHOR
            - REVIEWER
            - PARTICIPANT
        approved:
          type: boolean
        state:
          type: string
          enum:
            - approved
            - changes_requested
            - "null"

    repository:
      type: object
      properties:
        name:
          type: string
        full_name:
          type: string
        uuid:
          type: string
        links:
          type: object
          properties:
            self:
              $ref: '#/components/schemas/link'
            html:
              $ref: '#/components/schemas/link'

    link:
      type: object
      properties:
        href:
          type: string
        name:
          type: string
