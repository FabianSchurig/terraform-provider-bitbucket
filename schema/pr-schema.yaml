          comment_count:
            type: integer
            description: The number of comments for a specific pull request.
            minimum: 0
          task_count:
            type: integer
            description: The number of open tasks for a specific pull request.
            minimum: 0
          close_source_branch:
            type: boolean
            description: A boolean flag indicating if merging the pull request closes
              the source branch.
          closed_by:
            $ref: '#/components/schemas/account'
          reason:
            type: string
            description: Explains why a pull request was declined. This field is only
              applicable to pull requests in rejected state.
          created_on:
            type: string
            description: The ISO8601 timestamp the request was created.
            format: date-time
          updated_on:
            type: string
            description: The ISO8601 timestamp the request was last updated.
            format: date-time
          reviewers:
            type: array
            description: The list of users that were added as reviewers on this pull
              request when it was created. For performance reasons, the API only includes
              this list on a pull request's `self` URL.
            items:
              $ref: '#/components/schemas/account'
          participants:
            type: array
            description: "        The list of users that are collaborating on this\
              \ pull request.\n        Collaborators are user that:\n\n        * are\
              \ added to the pull request as a reviewer (part of the reviewers\n \
              \         list)\n        * are not explicit reviewers, but have commented\
              \ on the pull request\n        * are not explicit reviewers, but have\
              \ approved the pull request\n\n        Each user is wrapped in an object\
              \ that indicates the user's role and\n        whether they have approved\
              \ the pull request. For performance reasons,\n        the API only returns\
              \ this list when an API requests a pull request by\n        id.\n  \
              \      "
            items:
              $ref: '#/components/schemas/participant'
          draft:
            type: boolean
            description: A boolean flag indicating whether the pull request is a draft.
          queued:
            type: boolean
            description: A boolean flag indicating whether the pull request is queued
          description:
            type: string
            description: Explains what the pull request does.
        additionalProperties: true
    pullrequest_endpoint:
      type: object
      title: Pull Request Endpoint
      properties:
        repository:
          $ref: '#/components/schemas/repository'
        branch:
          $ref: '#/components/schemas/pullrequest_endpoint_branch'
        commit:
          type: object
          title: Pull Request Commit
          properties:
            hash:
              type: string
              pattern: '[0-9a-f]{7,}?'
          additionalProperties: false
      additionalProperties: false
    paginated_default_reviewer_and_type:
      type: object
      title: Paginated Default Reviewer and Type
      description: A paginated list of default reviewers with reviewer type.
      properties:
        size:
          type: integer
          description: Total number of objects in the response. This is an optional
            element that is not provided in all responses, as it can be expensive
            to compute.
          minimum: 0
        page:
          type: integer
          description: Page number of the current results. This is an optional element
            that is not provided in all responses.
          minimum: 1
        pagelen:
          type: integer
          description: Current number of objects on the existing page. The default
            value is 10 with 100 being the maximum allowed value. Individual APIs
            may enforce different values.
          minimum: 1
        next:
          type: string
          description: Link to the next page if it exists. The last page of a collection
            does not have this value. Use this link to navigate the result set and
            refrain from constructing your own URLs.
          format: uri
        previous:
          type: string
          description: Link to previous page if it exists. A collections first page
            does not have this value. This is an optional element that is not provided
            in all responses. Some result sets strictly support forward navigation
            and never provide previous links. Clients must anticipate that backwards
            navigation is not always available. Use this link to navigate the result
            set and refrain from constructing your own URLs.
          format: uri
        values:
          type: array
          items:
            $ref: '#/components/schemas/default_reviewer_and_type'
          minItems: 0
          uniqueItems: true
      additionalProperties: false
    pullrequest_merge_parameters:
      type: object
      title: Pull Request Merge Parameters
      description: The metadata that describes a pull request merge.
      properties:
        type:
          type: string
        message:
          type: string
          description: The commit message that will be used on the resulting commit.
            Note that the size of the message is limited to 128 KiB.
        close_source_branch:
          type: boolean
          description: Whether the source branch should be deleted. If this is not
            provided, we fallback to the value used when the pull request was created,
            which defaults to False
        merge_strategy:
          type: string
          description: The merge strategy that will be used to merge the pull request.
          enum:
          - merge_commit
          - squash
          - fast_forward
          - squash_fast_forward
          - rebase_fast_forward
          - rebase_merge
          default: merge_commit
      required:
      - type
      additionalProperties: true
    base_commit:
      allOf:
      - $ref: '#/components/schemas/object'
      - type: object
        title: Base Commit
        description: The common base type for both repository and snippet commits.
        properties:
          hash:
            type: string
