  /repositories/{workspace}/{repo_slug}/src:
    get:
      tags:
      - Source
      - Repositories
      description: 'This endpoint redirects the client to the directory listing of
        the

        root directory on the main branch.


        This is equivalent to directly hitting

        [/2.0/repositories/{username}/{repo_slug}/src/{commit}/{path}](src/%7Bcommit%7D/%7Bpath%7D)

        without having to know the name or SHA1 of the repo''s main branch.


        To create new commits, [POST to this endpoint](#post)'
      summary: Get the root directory of the main branch
      responses:
        '200':
          description: 'If the path matches a file, then the raw contents of the file
            are

            returned (unless the `format=meta` query parameter was provided,

            in which case a json document containing the file''s meta data is

            returned). If the path matches a directory, then a paginated

            list of file and directory entries is returned (if the

            `format=meta` query parameter was provided, then the json document

            containing the directory''s meta data is returned).

            '
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/paginated_treeentries'
        '404':
          description: If the path or commit in the URL does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: format
        in: query
        description: Instead of returning the file's contents, return the (json) meta
          data for it.
        required: false
        schema:
          type: string
          enum:
          - meta
      security:
      - oauth2:
        - repository
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - read:repository:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: getTheRootDirectoryOfTheMainBranch
    post:
      tags:
      - Source
      - Repositories
      description: "This endpoint is used to create new commits in the repository\
        \ by\nuploading files.\n\nTo add a new file to a repository:\n\n```\n$ curl\
        \ https://api.bitbucket.org/2.0/repositories/username/slug/src \\\n  -F /repo/path/to/image.png=@image.png\n\
        ```\n\nThis will create a new commit on top of the main branch, inheriting\
        \ the\ncontents of the main branch, but adding (or overwriting) the\n`image.png`\
        \ file to the repository in the `/repo/path/to` directory.\n\nTo create a\
        \ commit that deletes files, use the `files` parameter:\n\n```\n$ curl https://api.bitbucket.org/2.0/repositories/username/slug/src\
        \ \\\n  -F files=/file/to/delete/1.txt \\\n  -F files=/file/to/delete/2.txt\n\
        ```\n\nYou can add/modify/delete multiple files in a request. Rename/move\
        \ a\nfile by deleting the old path and adding the content at the new path.\n\
        \nThis endpoint accepts `multipart/form-data` (as in the examples above),\n\
        as well as `application/x-www-form-urlencoded`.\n\nNote: `multipart/form-data`\
        \ is currently not supported by Forge apps\nfor this API.\n\n#### multipart/form-data\n\
        \nA `multipart/form-data` post contains a series of \"form fields\" that\n\
        identify both the individual files that are being uploaded, as well as\nadditional,\
        \ optional meta data.\n\nFiles are uploaded in file form fields (those that\
        \ have a\n`Content-Disposition` parameter) whose field names point to the\
        \ remote\npath in the repository where the file should be stored. Path field\n\
        names are always interpreted to be absolute from the root of the\nrepository,\
        \ regardless whether the client uses a leading slash (as the\nabove `curl`\
        \ example did).\n\nFile contents are treated as bytes and are not decoded\
        \ as text.\n\nThe commit message, as well as other non-file meta data for\
        \ the\nrequest, is sent along as normal form field elements. Meta data fields\n\
        share the same namespace as the file objects. For `multipart/form-data`\n\
        bodies that should not lead to any ambiguity, as the\n`Content-Disposition`\
        \ header will contain the `filename` parameter to\ndistinguish between a file\
        \ named \"message\" and the commit message field.\n\n#### application/x-www-form-urlencoded\n\
        \nIt is also possible to upload new files using a simple\n`application/x-www-form-urlencoded`\
        \ POST. This can be convenient when\nuploading pure text files:\n\n```\n$\
        \ curl https://api.bitbucket.org/2.0/repositories/atlassian/bbql/src \\\n\
        \  --data-urlencode \"/path/to/me.txt=Lorem ipsum.\" \\\n  --data-urlencode\
        \ \"message=Initial commit\" \\\n  --data-urlencode \"author=Erik van Zijst\
        \ <erik.van.zijst@gmail.com>\"\n```\n\nThere could be a field name clash if\
        \ a client were to upload a file\nnamed \"message\", as this filename clashes\
        \ with the meta data property\nfor the commit message. To avoid this and to\
        \ upload files whose names\nclash with the meta data properties, use a leading\
        \ slash for the files,\ne.g. `curl --data-urlencode \"/message=file contents\"\
        `.\n\nWhen an explicit slash is omitted for a file whose path matches that\
        \ of\na meta data parameter, then it is interpreted as meta data, not as a\n\
        file.\n\n#### Executables and links\n\nWhile this API aims to facilitate the\
        \ most common use cases, it is\npossible to perform some more advanced operations\
        \ like creating a new\nsymlink in the repository, or creating an executable\
        \ file.\n\nFiles can be supplied with a `x-attributes` value in the\n`Content-Disposition`\
        \ header. For example, to upload an executable\nfile, as well as create a\
        \ symlink from `README.txt` to `README`:\n\n```\n--===============1438169132528273974==\n\
        Content-Type: text/plain; charset=\"us-ascii\"\nMIME-Version: 1.0\nContent-Transfer-Encoding:\
        \ 7bit\nContent-ID: \"bin/shutdown.sh\"\nContent-Disposition: attachment;\
        \ filename=\"shutdown.sh\"; x-attributes:\"executable\"\n\n#!/bin/sh\nhalt\n\
        \n--===============1438169132528273974==\nContent-Type: text/plain; charset=\"\
        us-ascii\"\nMIME-Version: 1.0\nContent-Transfer-Encoding: 7bit\nContent-ID:\
        \ \"/README.txt\"\nContent-Disposition: attachment; filename=\"README.txt\"\
        ; x-attributes:\"link\"\n\nREADME\n--===============1438169132528273974==--\n\
        ```\n\nLinks are files that contain the target path and have\n`x-attributes:\"\
        link\"` set.\n\nWhen overwriting links with files, or vice versa, the newly\
        \ uploaded\nfile determines both the new contents, as well as the attributes.\
        \ That\nmeans uploading a file without specifying `x-attributes=\"link\"`\
        \ will\ncreate a regular file, even if the parent commit hosted a symlink\
        \ at\nthe same path.\n\nThe same applies to executables. When modifying an\
        \ existing executable\nfile, the form-data file element must include\n`x-attributes=\"\
        executable\"` in order to preserve the executable status\nof the file.\n\n\
        Note that this API does not support the creation or manipulation of\nsubrepos\
        \ / submodules."
      summary: Create a commit by uploading a file
      responses:
        '201':
          description: '

            '
        '403':
          description: If the authenticated user does not have write or admin access
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
        '404':
          description: If the repository does not exist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error'
      parameters:
      - name: message
        in: query
        description: The commit message. When omitted, Bitbucket uses a canned string.
        required: false
        schema:
          type: string
      - name: author
        in: query
        description: '

          The raw string to be used as the new commit''s author.

          This string follows the format

          `Erik van Zijst <evzijst@atlassian.com>`.


          When omitted, Bitbucket uses the authenticated user''s

          full/display name and primary email address. Commits cannot

          be created anonymously.'
        required: false
        schema:
          type: string
      - name: parents
        in: query
        description: '

          #### Deprecation Notice:

          Support for specifying multiple parent

          commits is deprecated and will be removed in a future release.

          Only a single SHA1 is accepted.


          A SHA1 of the commit that should be the parent of the newly created

          commit. When omitted, the new commit will inherit from and

          become a child of the main branch''s tip/HEAD commit.'
        required: false
        schema:
          type: string
      - name: files
        in: query
        description: '

          Optional field that declares the files that the request is

          manipulating. When adding a new file to a repo, or when

          overwriting an existing file, the client can just upload

          the full contents of the file in a normal form field and

          the use of this `files` meta data field is redundant.

          However, when the `files` field contains a file path that

          does not have a corresponding, identically-named form

          field, then Bitbucket interprets that as the client wanting

          to replace the named file with the null set and the file is

          deleted instead.


          Paths in the repo that are referenced in neither files nor

          an individual file field, remain unchanged and carry over

          from the parent to the new commit.


          This API does not support renaming as an explicit feature.

          To rename a file, simply delete it and recreate it under

          the new name in the same commit.

          '
        required: false
        schema:
          type: string
      - name: branch
        in: query
        description: '

          The name of the branch that the new commit should be

          created on. When omitted, the commit will be created on top

          of the main branch and will become the main branch''s new

          head.


          When a branch name is provided that already exists in the

          repo, then the commit will be created on top of that

          branch. In this case, *if* a parent SHA1 was also provided,

          then it is asserted that the parent is the branch''s

          tip/HEAD at the time the request is made. When this is not

          the case, a 409 is returned.


          When a new branch name is specified (that does not already

          exist in the repo), and no parent SHA1s are provided, then

          the new commit will inherit from the current main branch''s

          tip/HEAD commit, but not advance the main branch. The new

          commit will be the new branch. When the request *also*

          specifies a parent SHA1, then the new commit and branch

          are created directly on top of the parent commit,

          regardless of the state of the main branch.


          When a branch name is not specified, but a parent SHA1 is

          provided, then Bitbucket asserts that it represents the

          main branch''s current HEAD/tip, or a 409 is returned.


          When a branch name is not specified and the repo is empty,

          the new commit will become the repo''s root commit and will

          be on the main branch.


          When a branch name is specified and the repo is empty, the

          new commit will become the repo''s root commit and also

          define the repo''s main branch going forward.


          This API cannot be used to create additional root commits

          in non-empty repos.


          The branch field cannot be repeated.


          As a side effect, this API can be used to create a new

          branch without modifying any files, by specifying a new

          branch name in this field, together with `parents`, but

          omitting the `files` fields, while not sending any files.

          This will create a new commit and branch with the same

          contents as the first parent. The diff of this commit

          against its first parent will be empty.

          '
        required: false
        schema:
          type: string
      security:
      - oauth2:
        - repository:write
      - basic: []
      - api_key: []
      x-atlassian-oauth2-scopes:
      - state: Current
        scheme: oauth2
        scopes:
        - write:repository:bitbucket
      x-atlassian-auth-types:
      - forge-oauth2
      - api-token
      operationId: createACommitByUploadingAFile
    parameters:
    - name: repo_slug
      in: path
