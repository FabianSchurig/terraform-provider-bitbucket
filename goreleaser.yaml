version: 2

project_name: bb-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: bb-cli
    main: ./cmd/bb-cli
    binary: bb-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

  - id: bb-mcp
    main: ./cmd/bb-mcp
    binary: bb-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

  - id: bb-tf
    main: ./cmd/bb-tf
    binary: terraform-provider-bitbucket
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: bb-cli
    builds:
      - bb-cli
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz
    name_template: "bb-cli_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: bb-mcp
    builds:
      - bb-mcp
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz
    name_template: "bb-mcp_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
  - id: bb-tf
    builds:
      - bb-tf
    format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz
    name_template: "terraform-provider-bitbucket_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: FabianSchurig
    name: bitbucket-cli

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

gomod:
  proxy: true
  env:
    - GOPROXY=https://proxy.golang.org,direct
    - GONOSUMCHECK=

brews:
  - name: bitbucket-cli
    ids:
      - bb-cli
    repository:
      owner: FabianSchurig
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "A CLI tool for interacting with Bitbucket."
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    install: |
      bin.install "bb-cli"
  - name: bitbucket-mcp
    ids:
      - bb-mcp
    repository:
      owner: FabianSchurig
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    description: "An MCP server for interacting with Bitbucket via AI agents."
    homepage: "https://github.com/FabianSchurig/bitbucket-cli"
    install: |
      bin.install "bb-mcp"
