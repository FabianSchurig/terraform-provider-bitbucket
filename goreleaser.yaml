version: 2

project_name: bb-cli

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/bb-cli
    binary: bb-cli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - format_overrides:
      - goos: windows
        formats:
          - zip
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  github:
    owner: FabianSchurig
    name: bitbucket-cli

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

gomod:
  proxy: true
  env:
    - GOPROXY=https://proxy.golang.org,direct
    - GONOSUMCHECK=
