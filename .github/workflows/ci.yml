name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

      - name: Format check
        run: test -z "$(gofmt -l .)" || (echo "Files not formatted:"; gofmt -l .; exit 1)

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Normalize coverage report for SonarQube
        run: |
          test -s coverage.out
          awk 'NR == 1 || ($0 !~ /\.gen\.go:/ && $0 !~ /^github.com\/FabianSchurig\/bitbucket-cli\/scripts\//)' coverage.out \
            | sed '2,$ s#^github.com/FabianSchurig/bitbucket-cli/##' \
            > coverage.out.tmp
          mv coverage.out.tmp coverage.out

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
