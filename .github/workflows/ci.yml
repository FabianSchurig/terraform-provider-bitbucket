name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.11.4

      - name: Vet
        run: go vet ./...

      - name: Test with race detector
        run: go test -race -coverprofile=coverage.out ./...

      - name: Normalize coverage report for SonarQube
        run: |
          test -s coverage.out
          awk 'NR == 1 || ($0 !~ /\.gen\.go:/ && $0 !~ /^github.com\/FabianSchurig\/bitbucket-cli\/scripts\//)' coverage.out \
            | sed '2,$ s#^github.com/FabianSchurig/bitbucket-cli/##' \
            > coverage.out.tmp
          mv coverage.out.tmp coverage.out

      - name: SonarQube Scan
        if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # Runs only on push events so that the GITHUB_TOKEN write scope is never
  # issued to a pull-request runner (including fork PRs).
  # Credentials are intentionally persisted so git-auto-commit-action can push.
  format:
    name: Format
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Format
        run: gofmt -w .

      - name: Commit formatting fixes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: "style: apply gofmt formatting [skip ci]"
          file_pattern: "*.go"
