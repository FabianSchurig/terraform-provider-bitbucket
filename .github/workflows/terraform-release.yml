name: Terraform Provider Release

on:
  push:
    tags:
      - 'v*'

# Only checkout is needed in this repo; the release is created in the
# terraform-provider-bitbucket repo via TERRAFORM_REPO_TOKEN.
permissions:
  contents: read

jobs:
  mirror:
    name: Mirror to terraform-provider-bitbucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push mirror
        run: |
          git remote add mirror "https://x-access-token:${TERRAFORM_REPO_TOKEN}@github.com/FabianSchurig/terraform-provider-bitbucket.git"
          git fetch origin main
          git push mirror refs/remotes/origin/main:refs/heads/main --force
          git push mirror --force --tags
        env:
          TERRAFORM_REPO_TOKEN: ${{ secrets.TERRAFORM_REPO_TOKEN }}

  release:
    name: Release Terraform provider
    needs: mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build & test
        run: go build ./... && go test ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          args: release --clean -f .goreleaser-terraform.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.TERRAFORM_REPO_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
