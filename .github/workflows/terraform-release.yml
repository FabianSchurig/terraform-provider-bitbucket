name: Terraform Provider Release

on:
  push:
    tags:
      - 'v*'

# Only checkout is needed in this repo; the release is created in the
# terraform-provider-bitbucket repo via TERRAFORM_REPO_TOKEN.
permissions:
  contents: read

jobs:
  mirror:
    name: Mirror to terraform-provider-bitbucket
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Push mirror
        run: |
          git remote add mirror "https://x-access-token:${TERRAFORM_REPO_TOKEN}@github.com/FabianSchurig/terraform-provider-bitbucket.git"
          git fetch origin main
          git push mirror refs/remotes/origin/main:refs/heads/main --force
          git push mirror --force --tags
        env:
          TERRAFORM_REPO_TOKEN: ${{ secrets.TERRAFORM_REPO_TOKEN }}

  release:
    name: Release Terraform provider
    needs: mirror
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: false

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@e89d40939c28e39f97cf32126055eeae86ba74ec # v6
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Build & test
        run: go build ./... && go test ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          govulncheck ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          args: release --clean -f .goreleaser-terraform.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.TERRAFORM_REPO_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
