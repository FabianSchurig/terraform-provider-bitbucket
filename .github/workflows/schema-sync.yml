name: Schema Sync & Release

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 03:00 UTC
  workflow_dispatch: # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PYTHONHASHSEED: "0" # Deterministic hash ordering for stable schema output
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for tagging

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest

      - name: Fetch live Bitbucket spec
        run: |
          curl -sSL "https://dac-static.atlassian.com/cloud/bitbucket/swagger.v3.json" \
            -o /tmp/bitbucket-raw.json
          echo "Fetched $(wc -c < /tmp/bitbucket-raw.json) bytes"

      - name: Enrich spec (inject operationIds)
        run: python3 scripts/enrich_spec.py /tmp/bitbucket-raw.json /tmp/bitbucket-enriched.json

      - name: Partition spec (extract paths + resolve $refs)
        run: python3 scripts/partition_spec.py /tmp/bitbucket-enriched.json schema/ --all

      - name: Detect schema change
        id: diff
        run: |
          git diff --quiet schema/ || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Regenerate types (oapi-codegen)
        if: steps.diff.outputs.changed == 'true'
        run: oapi-codegen --config oapi-codegen.yaml schema/pr-schema.yaml

      - name: Regenerate Cobra commands
        if: steps.diff.outputs.changed == 'true'
        run: |
          go run scripts/gen_commands/main.go schema/pr-schema.yaml internal/commands/commands.gen.go
          go run scripts/gen_commands/main.go schema/hooks-schema.yaml internal/commands/hooks.gen.go
          go run scripts/gen_commands/main.go schema/search-schema.yaml internal/commands/search.gen.go
          go run scripts/gen_commands/main.go schema/refs-schema.yaml internal/commands/refs.gen.go
          go run scripts/gen_commands/main.go schema/commits-schema.yaml internal/commands/commits.gen.go
          go run scripts/gen_commands/main.go schema/reports-schema.yaml internal/commands/reports.gen.go
          go run scripts/gen_commands/main.go schema/repositories-schema.yaml internal/commands/repositories.gen.go
          go run scripts/gen_commands/main.go schema/workspaces-schema.yaml internal/commands/workspaces.gen.go
          go run scripts/gen_commands/main.go schema/projects-schema.yaml internal/commands/projects.gen.go
          go run scripts/gen_commands/main.go schema/pipelines-schema.yaml internal/commands/pipelines.gen.go
          go run scripts/gen_commands/main.go schema/issues-schema.yaml internal/commands/issues.gen.go
          go run scripts/gen_commands/main.go schema/snippets-schema.yaml internal/commands/snippets.gen.go
          go run scripts/gen_commands/main.go schema/deployments-schema.yaml internal/commands/deployments.gen.go
          go run scripts/gen_commands/main.go schema/branch-restrictions-schema.yaml internal/commands/branch-restrictions.gen.go
          go run scripts/gen_commands/main.go schema/branching-model-schema.yaml internal/commands/branching-model.gen.go
          go run scripts/gen_commands/main.go schema/commit-statuses-schema.yaml internal/commands/commit-statuses.gen.go
          go run scripts/gen_commands/main.go schema/downloads-schema.yaml internal/commands/downloads.gen.go
          go run scripts/gen_commands/main.go schema/users-schema.yaml internal/commands/users.gen.go
          go run scripts/gen_commands/main.go schema/properties-schema.yaml internal/commands/properties.gen.go
          go run scripts/gen_commands/main.go schema/addon-schema.yaml internal/commands/addon.gen.go

      - name: Regenerate MCP tools
        if: steps.diff.outputs.changed == 'true'
        run: |
          go run scripts/gen_mcptools/main.go schema/pr-schema.yaml internal/mcptools/pr.gen.go
          go run scripts/gen_mcptools/main.go schema/hooks-schema.yaml internal/mcptools/hooks.gen.go
          go run scripts/gen_mcptools/main.go schema/search-schema.yaml internal/mcptools/search.gen.go
          go run scripts/gen_mcptools/main.go schema/refs-schema.yaml internal/mcptools/refs.gen.go
          go run scripts/gen_mcptools/main.go schema/commits-schema.yaml internal/mcptools/commits.gen.go
          go run scripts/gen_mcptools/main.go schema/reports-schema.yaml internal/mcptools/reports.gen.go
          go run scripts/gen_mcptools/main.go schema/repositories-schema.yaml internal/mcptools/repositories.gen.go
          go run scripts/gen_mcptools/main.go schema/workspaces-schema.yaml internal/mcptools/workspaces.gen.go
          go run scripts/gen_mcptools/main.go schema/projects-schema.yaml internal/mcptools/projects.gen.go
          go run scripts/gen_mcptools/main.go schema/pipelines-schema.yaml internal/mcptools/pipelines.gen.go
          go run scripts/gen_mcptools/main.go schema/issues-schema.yaml internal/mcptools/issues.gen.go
          go run scripts/gen_mcptools/main.go schema/snippets-schema.yaml internal/mcptools/snippets.gen.go
          go run scripts/gen_mcptools/main.go schema/deployments-schema.yaml internal/mcptools/deployments.gen.go
          go run scripts/gen_mcptools/main.go schema/branch-restrictions-schema.yaml internal/mcptools/branch-restrictions.gen.go
          go run scripts/gen_mcptools/main.go schema/branching-model-schema.yaml internal/mcptools/branching-model.gen.go
          go run scripts/gen_mcptools/main.go schema/commit-statuses-schema.yaml internal/mcptools/commit-statuses.gen.go
          go run scripts/gen_mcptools/main.go schema/downloads-schema.yaml internal/mcptools/downloads.gen.go
          go run scripts/gen_mcptools/main.go schema/users-schema.yaml internal/mcptools/users.gen.go
          go run scripts/gen_mcptools/main.go schema/properties-schema.yaml internal/mcptools/properties.gen.go
          go run scripts/gen_mcptools/main.go schema/addon-schema.yaml internal/mcptools/addon.gen.go

      - name: Regenerate Terraform resources
        if: steps.diff.outputs.changed == 'true'
        run: |
          go run scripts/gen_terraform/main.go schema/pr-schema.yaml internal/tfprovider/pr.gen.go
          go run scripts/gen_terraform/main.go schema/hooks-schema.yaml internal/tfprovider/hooks.gen.go
          go run scripts/gen_terraform/main.go schema/search-schema.yaml internal/tfprovider/search.gen.go
          go run scripts/gen_terraform/main.go schema/refs-schema.yaml internal/tfprovider/refs.gen.go
          go run scripts/gen_terraform/main.go schema/commits-schema.yaml internal/tfprovider/commits.gen.go
          go run scripts/gen_terraform/main.go schema/reports-schema.yaml internal/tfprovider/reports.gen.go
          go run scripts/gen_terraform/main.go schema/repositories-schema.yaml internal/tfprovider/repositories.gen.go
          go run scripts/gen_terraform/main.go schema/workspaces-schema.yaml internal/tfprovider/workspaces.gen.go
          go run scripts/gen_terraform/main.go schema/projects-schema.yaml internal/tfprovider/projects.gen.go
          go run scripts/gen_terraform/main.go schema/pipelines-schema.yaml internal/tfprovider/pipelines.gen.go
          go run scripts/gen_terraform/main.go schema/issues-schema.yaml internal/tfprovider/issues.gen.go
          go run scripts/gen_terraform/main.go schema/snippets-schema.yaml internal/tfprovider/snippets.gen.go
          go run scripts/gen_terraform/main.go schema/deployments-schema.yaml internal/tfprovider/deployments.gen.go
          go run scripts/gen_terraform/main.go schema/branch-restrictions-schema.yaml internal/tfprovider/branch-restrictions.gen.go
          go run scripts/gen_terraform/main.go schema/branching-model-schema.yaml internal/tfprovider/branching-model.gen.go
          go run scripts/gen_terraform/main.go schema/commit-statuses-schema.yaml internal/tfprovider/commit-statuses.gen.go
          go run scripts/gen_terraform/main.go schema/downloads-schema.yaml internal/tfprovider/downloads.gen.go
          go run scripts/gen_terraform/main.go schema/users-schema.yaml internal/tfprovider/users.gen.go
          go run scripts/gen_terraform/main.go schema/properties-schema.yaml internal/tfprovider/properties.gen.go
          go run scripts/gen_terraform/main.go schema/addon-schema.yaml internal/tfprovider/addon.gen.go

      - name: Regenerate Terraform docs & tests
        if: steps.diff.outputs.changed == 'true'
        run: go run scripts/gen_tfdocs/main.go

      - name: Build & test
        if: steps.diff.outputs.changed == 'true'
        run: go build ./... && go test ./...

      - name: Commit + tag release
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "bb-cli-bot"
          git config user.email "bot@github.com"
          git add schema/ internal/generated/ internal/commands/ internal/mcptools/ internal/tfprovider/ docs/ examples/ tests/

          # Determine next semver patch based on latest tag
          LATEST=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            VERSION="v1.0.0"
          else
            # Strip leading 'v', split, bump patch
            MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          git commit -m "chore: schema sync ${VERSION}"
          git tag -a "$VERSION" -m "chore: schema sync ${VERSION}"
          git push --follow-tags
          # The tag push triggers the Release workflow (release.yml)
