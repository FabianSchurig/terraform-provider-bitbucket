name: Terraform Acceptance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Mock-based tests run on every push/PR (no credentials needed)
  mock-tests:
    name: Mock Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false

      - name: Build provider
        run: go build ./cmd/bb-tf/...

      - name: Run Go acceptance tests (mock server)
        run: TF_ACC=1 go test -v -timeout 300s ./internal/tfprovider/ -run 'TestAcc'

  # Terraform native tests with mocked provider
  terraform-tests:
    name: Terraform Tests (mock)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-group:
          - repos
          - pr
          - projects
          - workspaces
          - issues
          - hooks
          - snippets
          - refs
          - commits
          - pipelines
          - deployments
          - branch-restrictions
          - branching-model
          - commit-statuses
          - downloads
          - users
          - reports
          - search
          - properties
          - addon
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3
        with:
          terraform_wrapper: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build provider
        run: go build -o "${GITHUB_WORKSPACE}/terraform-provider-bitbucket" ./cmd/bb-tf/...

      - name: Configure dev_overrides for local provider
        run: |
          cat > "${HOME}/.terraformrc" <<EOF
          provider_installation {
            dev_overrides {
              "FabianSchurig/bitbucket" = "${GITHUB_WORKSPACE}"
            }
            direct {}
          }
          EOF

      - name: Run terraform test (${{ matrix.test-group }})
        working-directory: tests/${{ matrix.test-group }}
        run: terraform test

  # Real API tests: only run on push to main, manual dispatch, or same-repo PRs.
  # Fork PRs never receive secrets so this job is skipped entirely to avoid
  # creating a runner that will always be a no-op.
  acceptance-tests:
    name: Acceptance Tests (real API)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event_name == 'workflow_dispatch' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run real API acceptance tests
        env:
          TF_ACC: "1"
          BITBUCKET_USERNAME: ${{ secrets.BITBUCKET_USERNAME }}
          BITBUCKET_TOKEN: ${{ secrets.BITBUCKET_TOKEN }}
          BITBUCKET_TEST_WORKSPACE: ${{ secrets.BITBUCKET_TEST_WORKSPACE }}
          BITBUCKET_TEST_USER: ${{ secrets.BITBUCKET_TEST_USER || vars.BITBUCKET_TEST_USER }}
          BITBUCKET_TEST_REPO: ${{ secrets.BITBUCKET_TEST_REPO || vars.BITBUCKET_TEST_REPO }}
        run: |
          if [ -z "$BITBUCKET_USERNAME" ] && [ -z "$BITBUCKET_TOKEN" ]; then
            echo "No Bitbucket credentials configured. Skipping real API tests."
            echo "Configure BITBUCKET_USERNAME and BITBUCKET_TOKEN as repository secrets."
            exit 0
          fi
          echo "BITBUCKET_TEST_USER set: $([ -n "$BITBUCKET_TEST_USER" ] && echo yes || echo no)"
          echo "BITBUCKET_TEST_REPO set: $([ -n "$BITBUCKET_TEST_REPO" ] && echo yes || echo no)"
          go test -v -timeout 600s ./internal/tfprovider/ -run 'TestAccRealAPI'
