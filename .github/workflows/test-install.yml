name: Test Install

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed

permissions:
  contents: read

jobs:
  test-homebrew:
    name: Test Homebrew install
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    container:
      image: homebrew/brew:latest
    steps:
      - name: Install bb-cli from tap
        run: |
          brew tap FabianSchurig/tap
          brew install bitbucket-cli

      - name: Verify bb-cli
        run: bb-cli --help

      - name: Install bb-mcp from tap
        run: brew install bitbucket-mcp

      - name: Verify bb-mcp
        run: bb-mcp --help

  test-deb:
    name: Test .deb install
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get latest release tag
        id: tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/FabianSchurig/bitbucket-cli/releases/latest | jq -r .tag_name)
          VERSION=${TAG#v}
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download and install bb-cli .deb
        run: |
          curl -LO "https://github.com/FabianSchurig/bitbucket-cli/releases/download/v${{ steps.tag.outputs.version }}/bb-cli_${{ steps.tag.outputs.version }}_amd64.deb"
          sudo dpkg -i bb-cli_*.deb

      - name: Verify bb-cli
        run: bb-cli --help

      - name: Download and install bb-mcp .deb
        run: |
          curl -LO "https://github.com/FabianSchurig/bitbucket-cli/releases/download/v${{ steps.tag.outputs.version }}/bb-mcp_${{ steps.tag.outputs.version }}_amd64.deb"
          sudo dpkg -i bb-mcp_*.deb

      - name: Verify bb-mcp
        run: bb-mcp --help

  test-scoop:
    name: Test Scoop install
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest
    steps:
      - name: Install Scoop
        shell: pwsh
        run: |
          Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Scope CurrentUser -Force
          iex "& {$(irm get.scoop.sh)}"
          "$env:USERPROFILE\scoop\shims" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add bucket and install bb-cli
        shell: pwsh
        run: |
          scoop bucket add bitbucket https://github.com/FabianSchurig/scoop-bucket
          scoop install bb-cli

      - name: Verify bb-cli
        shell: pwsh
        run: bb-cli --help

      - name: Install bb-mcp
        shell: pwsh
        run: scoop install bb-mcp

      - name: Verify bb-mcp
        shell: pwsh
        run: bb-mcp --help

  test-install-script:
    name: Test install script (${{ matrix.os }})
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Run install script (bb-cli)
        run: |
          chmod +x install.sh
          sudo ./install.sh --binary bb-cli

      - name: Verify bb-cli
        run: bb-cli --help

      - name: Run install script (bb-mcp)
        run: sudo ./install.sh --binary bb-mcp

      - name: Verify bb-mcp
        run: bb-mcp --help
