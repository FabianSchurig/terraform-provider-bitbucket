version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "deps"
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
    labels:
      - ci

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default: 7
    commit-message:
      prefix: "deps"
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default: 7
    commit-message:
      prefix: "deps"
    labels:
      - dependencies
