sonar.projectKey=FabianSchurig_bitbucket-cli
sonar.organization=fabianschurig
sonar.sources=cmd,internal

# Exclude auto-generated files from analysis
sonar.exclusions=**/*.gen.go,internal/generated/**,schema/**

# Go test coverage
sonar.go.coverage.reportPaths=coverage.out

# Test file identification
sonar.tests=.
sonar.test.inclusions=**/*_test.go
